<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0"/>
  <title>Chroma Diary</title>
  <link href="https://fonts.googleapis.com/css2?family=Cormorant+Garamond:ital,wght@0,300;0,400;1,300;1,400&family=DM+Mono:wght@300;400&display=swap" rel="stylesheet"/>
  <style>
    *, *::before, *::after { box-sizing: border-box; margin: 0; padding: 0; }

    :root {
      --bg: #0e0e0f;
      --surface: #141415;
      --border: #2a2a2e;
      --text: #e8e4dc;
      --muted: #6b6868;
      --accent: #c9b99a;
    }

    body {
      background: var(--bg);
      color: var(--text);
      font-family: 'Cormorant Garamond', Georgia, serif;
      min-height: 100vh;
      display: flex;
      flex-direction: column;
      align-items: center;
      justify-content: flex-start;
      padding: 60px 20px 80px;
      position: relative;
      overflow-x: hidden;
    }

    /* subtle grain overlay */
    body::before {
      content: '';
      position: fixed;
      inset: 0;
      background-image: url("data:image/svg+xml,%3Csvg viewBox='0 0 256 256' xmlns='http://www.w3.org/2000/svg'%3E%3Cfilter id='noise'%3E%3CfeTurbulence type='fractalNoise' baseFrequency='0.9' numOctaves='4' stitchTiles='stitch'/%3E%3C/filter%3E%3Crect width='100%25' height='100%25' filter='url(%23noise)' opacity='0.04'/%3E%3C/svg%3E");
      pointer-events: none;
      z-index: 0;
      opacity: 0.4;
    }

    .container {
      width: 100%;
      max-width: 640px;
      position: relative;
      z-index: 1;
    }

    header {
      text-align: center;
      margin-bottom: 56px;
      animation: fadeDown 0.9s ease both;
    }

    header h1 {
      font-size: 2.6rem;
      font-weight: 300;
      letter-spacing: 0.18em;
      color: var(--text);
      text-transform: uppercase;
    }

    header p {
      font-style: italic;
      font-size: 1.05rem;
      color: var(--muted);
      margin-top: 8px;
      font-weight: 300;
    }



    .entry-area {
      position: relative;
      animation: fadeUp 0.9s 0.2s ease both;
    }

    textarea {
      width: 100%;
      min-height: 220px;
      background: var(--surface);
      border: 1px solid var(--border);
      color: var(--text);
      font-family: 'Cormorant Garamond', Georgia, serif;
      font-size: 1.15rem;
      font-weight: 300;
      line-height: 1.8;
      padding: 24px 28px;
      border-radius: 6px;
      resize: vertical;
      outline: none;
      transition: border-color 0.3s;
      letter-spacing: 0.01em;
    }

    textarea:focus { border-color: #3a3a4a; }
    textarea::placeholder { color: #333338; font-style: italic; }

    .char-hint {
      font-family: 'DM Mono', monospace;
      font-size: 0.68rem;
      color: #333338;
      text-align: right;
      margin-top: 6px;
      letter-spacing: 0.05em;
    }

    .submit-row {
      display: flex;
      justify-content: flex-end;
      margin-top: 16px;
      animation: fadeUp 0.9s 0.3s ease both;
    }

    .btn-submit {
      background: transparent;
      border: 1px solid var(--accent);
      color: var(--accent);
      font-family: 'DM Mono', monospace;
      font-size: 0.78rem;
      letter-spacing: 0.12em;
      text-transform: uppercase;
      padding: 12px 28px;
      border-radius: 4px;
      cursor: pointer;
      transition: all 0.25s;
      position: relative;
      overflow: hidden;
    }

    .btn-submit:hover {
      background: var(--accent);
      color: var(--bg);
    }

    .btn-submit:disabled {
      opacity: 0.35;
      cursor: not-allowed;
      background: transparent;
      color: var(--muted);
      border-color: var(--border);
    }

    /* loading dots */
    .dots span {
      display: inline-block;
      animation: blink 1.2s infinite;
      font-size: 1.2rem;
    }
    .dots span:nth-child(2) { animation-delay: 0.2s; }
    .dots span:nth-child(3) { animation-delay: 0.4s; }

    /* result card */
    .result {
      margin-top: 48px;
      animation: fadeUp 0.7s ease both;
    }

    .color-block-label {
      position: absolute;
      bottom: 12px;
      right: 16px;
      font-family: 'DM Mono', monospace;
      font-size: 0.65rem;
      letter-spacing: 0.1em;
      text-transform: uppercase;
      animation: labelPulse 2.5s ease-in-out infinite;
      pointer-events: none;
    }

    .rgb-tooltip {
      display: none;
      position: absolute;
      bottom: 0;
      left: 0;
      right: 0;
      background: rgba(0,0,0,0.55);
      backdrop-filter: blur(8px);
      padding: 16px 20px;
      font-family: 'DM Mono', monospace;
      font-size: 0.78rem;
      letter-spacing: 0.08em;
      color: rgba(255,255,255,0.85);
      animation: fadeUp 0.3s ease both;
    }

    .rgb-tooltip.visible { display: block; }

    .rgb-bars {
      display: flex;
      flex-direction: column;
      gap: 6px;
      margin-top: 8px;
    }

    .rgb-bar-row {
      display: flex;
      align-items: center;
      gap: 10px;
    }

    .rgb-label {
      width: 14px;
      font-size: 0.7rem;
      opacity: 0.7;
    }

    .rgb-track {
      flex: 1;
      height: 4px;
      background: rgba(255,255,255,0.1);
      border-radius: 2px;
      overflow: hidden;
    }

    .rgb-fill {
      height: 100%;
      border-radius: 2px;
      transition: width 1s ease;
    }

    .rgb-val {
      width: 28px;
      text-align: right;
      font-size: 0.68rem;
      opacity: 0.6;
    }

    .reflection {
      margin-top: 24px;
      padding: 24px 28px;
      background: var(--surface);
      border: 1px solid var(--border);
      border-radius: 6px;
    }

    .reflection-label {
      font-family: 'DM Mono', monospace;
      font-size: 0.65rem;
      letter-spacing: 0.14em;
      text-transform: uppercase;
      color: var(--muted);
      margin-bottom: 14px;
    }

    .reflection-text {
      font-size: 1.12rem;
      font-weight: 300;
      line-height: 1.85;
      color: var(--text);
      font-style: italic;
    }

    .discard-note {
      margin-top: 20px;
      text-align: center;
      font-family: 'DM Mono', monospace;
      font-size: 0.65rem;
      color: #2e2e32;
      letter-spacing: 0.1em;
      text-transform: uppercase;
    }

    .new-entry-btn {
      display: block;
      margin: 28px auto 0;
      background: transparent;
      border: 1px solid var(--border);
      color: var(--muted);
      font-family: 'DM Mono', monospace;
      font-size: 0.72rem;
      letter-spacing: 0.1em;
      text-transform: uppercase;
      padding: 10px 24px;
      border-radius: 4px;
      cursor: pointer;
      transition: all 0.2s;
    }

    .new-entry-btn:hover { border-color: var(--muted); color: var(--text); }

    .error-msg {
      margin-top: 20px;
      padding: 14px 18px;
      background: #1a1010;
      border: 1px solid #3a1a1a;
      border-radius: 4px;
      font-family: 'DM Mono', monospace;
      font-size: 0.75rem;
      color: #c07070;
      letter-spacing: 0.05em;
    }

    @keyframes labelPulse {
      0%, 100% { color: rgba(0,0,0,0.75); }
      50% { color: rgba(255,255,255,0.75); }
    }

    @keyframes fadeDown {
      from { opacity: 0; transform: translateY(-16px); }
      to   { opacity: 1; transform: translateY(0); }
    }

    @keyframes fadeUp {
      from { opacity: 0; transform: translateY(14px); }
      to   { opacity: 1; transform: translateY(0); }
    }

    @keyframes blink {
      0%, 80%, 100% { opacity: 0; }
      40% { opacity: 1; }
    }

    /* playlist offer */
    .playlist-offer {
      margin-top: 28px;
      padding: 24px 28px;
      background: #0c0c0d;
      border: 1px solid #222226;
      border-radius: 6px;
    }

    .playlist-label {
      font-family: 'DM Mono', monospace;
      font-size: 0.65rem;
      letter-spacing: 0.14em;
      text-transform: uppercase;
      color: var(--muted);
      margin-bottom: 8px;
    }

    .playlist-desc {
      font-style: italic;
      font-size: 1rem;
      color: #4a4a50;
      margin-bottom: 16px;
      font-weight: 300;
    }

    .playlist-btn {
      background: transparent;
      border: 1px solid #1DB954;
      color: #1DB954;
      font-family: 'DM Mono', monospace;
      font-size: 0.75rem;
      letter-spacing: 0.1em;
      text-transform: uppercase;
      padding: 10px 24px;
      border-radius: 4px;
      cursor: pointer;
      transition: all 0.25s;
    }

    .playlist-btn:hover {
      background: #1DB954;
      color: #000;
    }

    .playlist-btn:disabled {
      opacity: 0.4;
      cursor: not-allowed;
      background: transparent;
      color: var(--muted);
      border-color: var(--border);
    }

    .playlist-status {
      font-family: 'DM Mono', monospace;
      font-size: 0.7rem;
      color: var(--muted);
      margin-top: 14px;
      letter-spacing: 0.06em;
    }

    .playlist-result {
      margin-top: 20px;
    }

    .playlist-tracks {
      list-style: none;
      margin-top: 12px;
      max-height: 260px;
      overflow-y: auto;
      scrollbar-width: thin;
      scrollbar-color: #2a2a2e transparent;
    }

    .playlist-tracks li {
      display: flex;
      align-items: center;
      gap: 12px;
      padding: 8px 0;
      border-bottom: 1px solid #1a1a1e;
      font-size: 0.88rem;
    }

    .track-num {
      font-family: 'DM Mono', monospace;
      font-size: 0.6rem;
      color: #333338;
      width: 20px;
      text-align: right;
      flex-shrink: 0;
    }

    .track-info { flex: 1; min-width: 0; }

    .track-name {
      color: var(--text);
      font-weight: 400;
      white-space: nowrap;
      overflow: hidden;
      text-overflow: ellipsis;
    }

    .track-artist {
      font-size: 0.78rem;
      color: var(--muted);
      font-style: italic;
      white-space: nowrap;
      overflow: hidden;
      text-overflow: ellipsis;
    }

    .open-spotify-btn {
      display: inline-block;
      margin-top: 16px;
      background: #1DB954;
      color: #000;
      font-family: 'DM Mono', monospace;
      font-size: 0.72rem;
      letter-spacing: 0.1em;
      text-transform: uppercase;
      padding: 10px 24px;
      border-radius: 4px;
      text-decoration: none;
      transition: opacity 0.2s;
    }

    .open-spotify-btn:hover { opacity: 0.85; }


    /* playlist offer */
    .playlist-offer {
      margin-top: 28px;
      padding: 24px 28px;
      background: #0c0c0d;
      border: 1px solid var(--border);
      border-radius: 6px;
    }

    .playlist-label {
      font-family: 'DM Mono', monospace;
      font-size: 0.65rem;
      letter-spacing: 0.14em;
      text-transform: uppercase;
      color: var(--accent);
      margin-bottom: 8px;
    }

    .playlist-desc {
      font-size: 1rem;
      font-weight: 300;
      font-style: italic;
      color: var(--muted);
      margin-bottom: 16px;
    }

    .playlist-btn {
      background: transparent;
      border: 1px solid var(--accent);
      color: var(--accent);
      font-family: 'DM Mono', monospace;
      font-size: 0.75rem;
      letter-spacing: 0.1em;
      text-transform: uppercase;
      padding: 11px 24px;
      border-radius: 4px;
      cursor: pointer;
      transition: all 0.2s;
    }

    .playlist-btn:hover { background: var(--accent); color: var(--bg); }
    .playlist-btn:disabled { opacity: 0.4; cursor: not-allowed; }

    .playlist-status {
      margin-top: 14px;
      font-family: 'DM Mono', monospace;
      font-size: 0.72rem;
      color: var(--muted);
      letter-spacing: 0.06em;
    }

    .playlist-tracks {
      margin-top: 16px;
      display: flex;
      flex-direction: column;
      gap: 6px;
      max-height: 220px;
      overflow-y: auto;
    }

    .track-row {
      display: flex;
      align-items: center;
      gap: 12px;
      padding: 6px 0;
      border-bottom: 1px solid #1a1a1e;
      cursor: pointer;
      transition: opacity 0.2s;
    }

    .track-row:hover { opacity: 0.7; }
    .track-row.playing { border-bottom-color: var(--accent); }

    .track-num {
      font-family: 'DM Mono', monospace;
      font-size: 0.6rem;
      color: #2e2e32;
      width: 18px;
      text-align: right;
    }

    .track-num.playing-indicator::after { content: '▶'; color: var(--accent); }

    .track-info { flex: 1; }

    .track-name {
      font-size: 0.9rem;
      color: var(--text);
      font-weight: 300;
    }

    .track-artist {
      font-family: 'DM Mono', monospace;
      font-size: 0.62rem;
      color: var(--muted);
      margin-top: 2px;
    }

    .yt-player-wrap {
      margin-top: 16px;
      border-radius: 6px;
      overflow: hidden;
      background: #000;
      position: relative;
    }

    .yt-player-wrap iframe {
      display: block;
      width: 100%;
      height: 180px;
      border: none;
    }

    .yt-controls {
      display: flex;
      gap: 10px;
      margin-top: 10px;
      align-items: center;
    }

    .yt-ctrl-btn {
      background: transparent;
      border: 1px solid var(--border);
      color: var(--muted);
      font-family: 'DM Mono', monospace;
      font-size: 0.68rem;
      letter-spacing: 0.08em;
      text-transform: uppercase;
      padding: 6px 14px;
      border-radius: 3px;
      cursor: pointer;
      transition: all 0.2s;
    }
    .yt-ctrl-btn:hover { border-color: var(--accent); color: var(--accent); }

    .yt-track-info {
      flex: 1;
      font-family: 'DM Mono', monospace;
      font-size: 0.65rem;
      color: var(--muted);
      letter-spacing: 0.05em;
    }
  </style>
</head>
<body>
<div class="container">

  <header>
    <h1>Chroma Diary</h1>
    <p>write freely. only color remains.</p>
  </header>



  <!-- Entry -->
  <div class="entry-area" id="entryArea">
    <textarea id="entry" placeholder="write whatever you need to write. it won't be saved." maxlength="2000" oninput="updateChar()"></textarea>
    <div class="char-hint"><span id="charCount">0</span> / 2000</div>
  </div>

  <div class="submit-row">
    <button class="btn-submit" id="submitBtn" onclick="submitEntry()">submit</button>
  </div>

  <div id="loadingArea" style="display:none; text-align:center; margin-top:40px;">
    <div class="dots" style="color:var(--muted); font-family:'DM Mono',monospace; font-size:0.8rem; letter-spacing:0.1em;">
      reading<span>.</span><span>.</span><span>.</span>
    </div>
  </div>

  <div id="errorArea"></div>
  <div id="resultArea"></div>

  <div style="text-align:center; margin-top:48px;">
    <a href="history.html" style="font-family:'DM Mono',monospace; font-size:0.68rem; letter-spacing:0.12em; text-transform:uppercase; color:#2e2e32; text-decoration:none; transition:color 0.2s;" onmouseover="this.style.color='#6b6868'" onmouseout="this.style.color='#2e2e32'">view history →</a>
  </div>

</div>

<script>
  let savedKey = '';
  let tooltipVisible = false;

  function updateChar() {
    const len = document.getElementById('entry').value.length;
    document.getElementById('charCount').textContent = len;
  }

  function toggleTooltip() {
    tooltipVisible = !tooltipVisible;
    const t = document.getElementById('rgbTooltip');
    if (tooltipVisible) t.classList.add('visible');
    else t.classList.remove('visible');
  }

  async function submitEntry() {
    const key = savedKey;

    const text = document.getElementById('entry').value.trim();
    if (!text) { showError('nothing to read yet.'); return; }

    document.getElementById('submitBtn').disabled = true;
    document.getElementById('loadingArea').style.display = 'block';
    document.getElementById('errorArea').innerHTML = '';
    document.getElementById('resultArea').innerHTML = '';

    const prompt = `You are reading someone's private diary entry. You must return exactly two lines.

Line 1: RGBA: [number],[number],[number],[number]
Line 2: REFLECTION: [2-4 warm honest sentences]

Red = rage (0-255): emotional intensity, heat, agitation
Green = glee (0-255): joy, lightness, warmth
Blue = bleakness (0-255): heaviness, weight, quiet sorrow
Alpha = serenity (0-255): the degree of stillness and ease in the emotional state, regardless of valence. A peaceful grief is serene. A joyful chaos is not. High = still and easeful, Low = turbulent and activated.

Example:
RGBA: 120,80,200,180
REFLECTION: You carried something heavy today. That kind of weight does not just disappear, but you showed up anyway. There is something quietly brave in that.

Diary entry: ${text}`;
    try {
      // retry up to 3 times for flaky free models
      let data, raw = '';
      for (let attempt = 0; attempt < 3; attempt++) {
        if (attempt > 0) {
          setLoadingText('retrying...');
          await new Promise(r => setTimeout(r, 2000));
        }
        const res = await fetch('https://chromadiary-proxy.sotempyhehe.workers.dev', {
          method: 'POST',
          headers: { 'Content-Type': 'application/json' },
          body: JSON.stringify({ prompt })
        });
        data = await res.json();
        if (data.error) continue;
        raw = data?.choices?.[0]?.message?.content || '';
        if (raw) break;
      }
      if (!raw) throw new Error(data?.error?.message || 'no response after 3 attempts. try again.');

      // parse — very forgiving, handles any model output
      const cleaned = raw.replace(/```[a-z]*\n?/gi, '').trim();

      // try to find RGBA anywhere in the response (4 numbers)
      const rgbaMatch = cleaned.match(/(?:RGBA:?\s*)?(\d{1,3})[,\s]+(\d{1,3})[,\s]+(\d{1,3})[,\s]+(\d{1,3})/i);
      // fallback to RGB (3 numbers) if model ignores serenity
      const rgbMatch = rgbaMatch || cleaned.match(/(?:RGB:?\s*)?(\d{1,3})[,\s]+(\d{1,3})[,\s]+(\d{1,3})/i);

      // try to find REFLECTION label, fallback to everything after first line
      let reflection = '';
      const reflMatch = cleaned.match(/REFLECTION:?\s*([\s\S]+)/i);
      if (reflMatch) {
        reflection = reflMatch[1].trim();
      } else {
        const lines = cleaned.split('\n').map(l => l.trim()).filter(l => l);
        const nonRGB = lines.filter(l => !l.match(/^\d{1,3}[,\s]+\d{1,3}/) && !l.match(/^RGB/i) && !l.match(/^RGBA/i));
        reflection = nonRGB.join(' ').trim();
      }

      if (!reflection) reflection = 'Something in these words carries weight. Sit with it.';
      if (!rgbMatch) throw new Error('format error: ' + cleaned.substring(0, 200));

      const r = Math.min(255, parseInt(rgbMatch[1]));
      const g = Math.min(255, parseInt(rgbMatch[2]));
      const b = Math.min(255, parseInt(rgbMatch[3]));
      const s = rgbaMatch ? Math.min(255, parseInt(rgbaMatch[4])) : 128;

      // scale to 0-100 for display
      const r100 = Math.round(r / 255 * 100);
      const g100 = Math.round(g / 255 * 100);
      const b100 = Math.round(b / 255 * 100);
      const s100 = Math.round(s / 255 * 100);

      // save to localStorage
      const entry = {
        timestamp: new Date().toISOString(),
        r, g, b, s, r100, g100, b100, s100,
        reflection
      };
      const history = JSON.parse(localStorage.getItem('chroma_history') || '[]');
      history.unshift(entry);
      localStorage.setItem('chroma_history', JSON.stringify(history));

      showResult(r, g, b, s, r100, g100, b100, s100, reflection);

      // clear the textarea
      document.getElementById('entry').value = '';
      document.getElementById('charCount').textContent = '0';

    } catch (e) {
      showError(e.message);
    } finally {
      document.getElementById('loadingArea').style.display = 'none';
      document.getElementById('submitBtn').disabled = false;
    }
  }

  function showResult(r, g, b, s, r100, g100, b100, s100, reflection) {
    const html = `
      <div class="result">
        <div class="color-block" onclick="toggleTooltip()" style="position:relative;cursor:pointer;border-radius:6px;overflow:hidden;">
          <canvas id="colorCanvas" width="600" height="120" style="display:block;width:100%;height:120px;"></canvas>
          <div class="color-block-label">tap for breakdown</div>
          <div class="rgb-tooltip" id="rgbTooltip">
            <div style="font-size:0.65rem; opacity:0.5; margin-bottom:10px; letter-spacing:0.12em;">TODAY'S EMOTIONAL SPECTRUM</div>
            <div class="rgb-bars">
              <div class="rgb-bar-row">
                <span class="rgb-label">R</span>
                <div class="rgb-track"><div class="rgb-fill" style="width:${r100}%; background:rgba(255,100,100,0.8)"></div></div>
                <span class="rgb-val">${r100}</span>
              </div>
              <div class="rgb-bar-row">
                <span class="rgb-label">G</span>
                <div class="rgb-track"><div class="rgb-fill" style="width:${g100}%; background:rgba(100,200,130,0.8)"></div></div>
                <span class="rgb-val">${g100}</span>
              </div>
              <div class="rgb-bar-row">
                <span class="rgb-label">B</span>
                <div class="rgb-track"><div class="rgb-fill" style="width:${b100}%; background:rgba(100,150,255,0.8)"></div></div>
                <span class="rgb-val">${b100}</span>
              </div>
              <div class="rgb-bar-row">
                <span class="rgb-label">S</span>
                <div class="rgb-track"><div class="rgb-fill" style="width:${s100}%; background:linear-gradient(to right, #333, #fff)"></div></div>
                <span class="rgb-val">${s100}</span>
              </div>
            </div>
            <div style="margin-top:10px; font-size:0.62rem; opacity:0.35;">R = Rage · G = Glee · B = Bleakness · S = Serenity</div>
          </div>
        </div>

        <div class="reflection">
          <div class="reflection-label">reflection</div>
          <div class="reflection-text">${reflection}</div>
        </div>

        <div class="playlist-offer" id="playlistOffer">
          <div class="playlist-label">today's soundtrack</div>
          <p class="playlist-desc">let your mood shape a playlist.</p>
          <button class="playlist-btn" id="makePlaylistBtn" onclick="generateSongs(${r}, ${g}, ${b}, ${s})">make my playlist</button>
          <div id="playlistStatus"></div>
          <div id="playlistResult"></div>
        </div>

        <div class="discard-note">your entry has been released</div>
        <button class="new-entry-btn" onclick="newEntry()">new entry</button>
      </div>
    `;
    document.getElementById('resultArea').innerHTML = html;
    tooltipVisible = false;

    // draw serenity vignette on canvas
    requestAnimationFrame(() => drawColorCanvas(r, g, b, s));
  }

  function drawColorCanvas(r, g, b, s) {
    const canvas = document.getElementById('colorCanvas');
    if (!canvas) return;
    const ctx = canvas.getContext('2d');
    const W = canvas.width, H = canvas.height;

    // base color fill
    ctx.fillStyle = 'rgb(' + r + ',' + g + ',' + b + ')';
    ctx.fillRect(0, 0, W, H);

    // serenity vignette from corners
    // s=255 (serene) = light corners, s=0 (turbulent) = dark corners
    const vigIntensity = 1 - (s / 255); // 0 = no vignette, 1 = strong dark vignette
    const brightIntensity = s / 255;    // 0 = no brightening, 1 = full bright corners

    if (vigIntensity > 0.05) {
      // dark vignette for low serenity
      const grad = ctx.createRadialGradient(W/2, H/2, H*0.1, W/2, H/2, Math.sqrt(W*W+H*H)/2);
      grad.addColorStop(0, 'rgba(0,0,0,0)');
      grad.addColorStop(1, 'rgba(0,0,0,' + (vigIntensity * 0.75).toFixed(2) + ')');
      ctx.fillStyle = grad;
      ctx.fillRect(0, 0, W, H);
    }

    if (brightIntensity > 0.05) {
      // light vignette from corners for high serenity
      const grad2 = ctx.createRadialGradient(W/2, H/2, H*0.15, W/2, H/2, Math.sqrt(W*W+H*H)/2);
      grad2.addColorStop(0, 'rgba(255,255,255,0)');
      grad2.addColorStop(1, 'rgba(255,255,255,' + (brightIntensity * 0.45).toFixed(2) + ')');
      ctx.fillStyle = grad2;
      ctx.fillRect(0, 0, W, H);
    }
  }

  function setLoadingText(msg) {
    const el = document.querySelector('.dots');
    if (el) el.innerHTML = msg;
  }

  function showError(msg) {
    document.getElementById('errorArea').innerHTML = `<div class="error-msg">${msg}</div>`;
  }

  function newEntry() {
    document.getElementById('resultArea').innerHTML = '';
    document.getElementById('errorArea').innerHTML = '';
    document.getElementById('entry').focus();
  }

  // ── YouTube Playlist Integration ──────────────────────────────────

  let pendingSongs = [];
  let ytVideoIds = [];
  let ytCurrentIndex = 0;
  let ytPlayer = null;
  let ytApiReady = false;

  // load YouTube IFrame API
  const ytScript = document.createElement('script');
  ytScript.src = 'https://www.youtube.com/iframe_api';
  document.head.appendChild(ytScript);

  window.onYouTubeIframeAPIReady = function() {
    ytApiReady = true;
  };

  const WORKER_URL = 'https://chromadiary-proxy.sotempyhehe.workers.dev';

  function setPlaylistStatus(msg) {
    const el = document.getElementById('playlistStatus');
    if (el) el.innerHTML = msg ? '<div class="playlist-status">' + msg + '</div>' : '';
  }

  async function generateSongs(r, g, b, s) {
    const btn = document.getElementById('makePlaylistBtn');
    if (btn) btn.disabled = true;
    setPlaylistStatus('building your playlist...');

    const r100 = Math.round(r / 255 * 100);
    const g100 = Math.round(g / 255 * 100);
    const b100 = Math.round(b / 255 * 100);
    const s100 = Math.round((s || 128) / 255 * 100);

    const seed = Math.floor(Math.random() * 99999);
    const songPrompt = `You are a music curator. Recommend 15 songs that emotionally complement this mood. Seed: ${seed}.\n\nMood metrics (0-100):\n- Rage: ${r100} (intensity/heat)\n- Glee: ${g100} (joy/warmth)\n- Bleakness: ${b100} (heaviness/sorrow)\n- Serenity: ${s100} (stillness — high=calm, low=turbulent)\n\nLet serenity guide tempo and energy. Avoid obvious mainstream hits — prioritize deep cuts, album tracks, and lesser-known artists. Non-English music welcome if it fits.\n\nReturn ONLY a JSON array, no markdown:\n[{"title": "Song Title", "artist": "Artist Name"}, ...]`;

    let songs = [];
    let raw = '';

    const simpleFallbackPrompt = `Recommend 15 songs for this mood — Rage ${r100}, Glee ${g100}, Bleakness ${b100}, Serenity ${s100} (each 0-100). Avoid mainstream hits. Return ONLY a JSON array: [{"title":"Song Title","artist":"Artist Name"}]`;

    const playlistModels = ['nvidia/nemotron-3-super-120b-a12b:free', 'arcee-ai/trinity-large-preview:free'];

    for (let attempt = 0; attempt < 2; attempt++) {
      const promptToUse = attempt === 0 ? songPrompt : simpleFallbackPrompt;
      if (attempt === 1) setPlaylistStatus('refining playlist...');
      try {
        raw = '';
        for (const pm of playlistModels) {
          const res = await fetch(WORKER_URL, {
            method: 'POST',
            headers: { 'Content-Type': 'application/json' },
            body: JSON.stringify({ prompt: promptToUse, model: pm })
          });
          const data = await res.json();
          raw = data?.choices?.[0]?.message?.content || '';
          if (raw) break;
        }
        const arrayStart = raw.indexOf('[');
        const arrayEnd = raw.lastIndexOf(']');
        if (arrayStart === -1 || arrayEnd === -1) continue;
        songs = JSON.parse(raw.substring(arrayStart, arrayEnd + 1));
        if (songs.length > 0) break;
      } catch(e) {
        console.log('attempt', attempt, 'error:', e.message);
      }
    }

    if (!songs.length) {
      setPlaylistStatus('could not generate song list. try again.');
      if (btn) btn.disabled = false;
      return;
    }

    setPlaylistStatus('searching for tracks...');
    ytVideoIds = [];
    for (const song of songs) {
      try {
        const res = await fetch(WORKER_URL, {
          method: 'POST',
          headers: { 'Content-Type': 'application/json' },
          body: JSON.stringify({
            action: 'youtube_search',
            query: song.title + ' ' + song.artist + ' official audio'
          })
        });
        const data = await res.json();
        const items = data?.items || [];
        for (const item of items) {
          if (item?.id?.videoId) {
            ytVideoIds.push({ id: item.id.videoId, title: song.title, artist: song.artist });
            break;
          }
        }
      } catch(e) { /* skip */ }
    }

    if (ytVideoIds.length === 0) {
      setPlaylistStatus('could not find tracks. try again.');
      if (btn) btn.disabled = false;
      return;
    }

    setPlaylistStatus('');
    renderPlaylist();
    if (btn) btn.disabled = false;
  }

  function renderPlaylist() {
    const resultEl = document.getElementById('playlistResult');
    if (!resultEl) return;

    const trackHTML = ytVideoIds.map((t, i) => `
      <div class="track-row ${i === 0 ? 'playing' : ''}" onclick="playTrack(${i})" id="track-${i}">
        <span class="track-num ${i === 0 ? 'playing-indicator' : ''}" id="tracknum-${i}">${i === 0 ? '' : i + 1}</span>
        <div class="track-info">
          <div class="track-name">${t.title}</div>
          <div class="track-artist">${t.artist}</div>
        </div>
      </div>
    `).join('');

    resultEl.innerHTML = `
      <div class="yt-player-wrap" id="ytPlayerWrap">
        <div id="ytPlayerEl"></div>
      </div>
      <div class="yt-controls">
        <button class="yt-ctrl-btn" onclick="playPrev()">← prev</button>
        <div class="yt-track-info" id="ytTrackInfo">${ytVideoIds[0].title} — ${ytVideoIds[0].artist}</div>
        <button class="yt-ctrl-btn" onclick="playNext()">next →</button>
      </div>
      <div class="playlist-tracks">${trackHTML}</div>
    `;

    ytCurrentIndex = 0;
    initYTPlayer(ytVideoIds[0].id);
  }

  function initYTPlayer(videoId) {
    if (ytPlayer) {
      ytPlayer.loadVideoById(videoId);
      return;
    }
    if (!ytApiReady) {
      setTimeout(() => initYTPlayer(videoId), 300);
      return;
    }
    ytPlayer = new YT.Player('ytPlayerEl', {
      height: '180',
      width: '100%',
      videoId: videoId,
      playerVars: { autoplay: 1, controls: 1, rel: 0, modestbranding: 1, iv_load_policy: 3, vq: 'hd1080' },
      events: {
        onStateChange: function(e) {
          if (e.data === YT.PlayerState.ENDED) playNext();
        }
      }
    });
  }

  function playTrack(index) {
    ytCurrentIndex = index;
    document.querySelectorAll('.track-row').forEach((r, i) => r.classList.toggle('playing', i === index));
    document.querySelectorAll('.track-num').forEach((n, i) => {
      if (i === index) { n.classList.add('playing-indicator'); n.textContent = ''; }
      else { n.classList.remove('playing-indicator'); n.textContent = i + 1; }
    });
    const t = ytVideoIds[index];
    const info = document.getElementById('ytTrackInfo');
    if (info) info.textContent = t.title + ' — ' + t.artist;
    initYTPlayer(t.id);
  }

  function playNext() {
    if (ytCurrentIndex < ytVideoIds.length - 1) playTrack(ytCurrentIndex + 1);
  }

  function playPrev() {
    if (ytCurrentIndex > 0) playTrack(ytCurrentIndex - 1);
  }

</script>
