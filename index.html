<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0"/>
  <title>Chroma Diary</title>
  <link href="https://fonts.googleapis.com/css2?family=Cormorant+Garamond:ital,wght@0,300;0,400;1,300;1,400&family=DM+Mono:wght@300;400&display=swap" rel="stylesheet"/>
  <style>
    *, *::before, *::after { box-sizing: border-box; margin: 0; padding: 0; }

    :root {
      --bg: #0e0e0f;
      --surface: #141415;
      --border: #2a2a2e;
      --text: #e8e4dc;
      --muted: #6b6868;
      --accent: #c9b99a;
    }

    body {
      background: var(--bg);
      color: var(--text);
      font-family: 'Cormorant Garamond', Georgia, serif;
      min-height: 100vh;
      display: flex;
      flex-direction: column;
      align-items: center;
      justify-content: flex-start;
      padding: 60px 20px 80px;
      position: relative;
      overflow-x: hidden;
    }

    /* subtle grain overlay */
    body::before {
      content: '';
      position: fixed;
      inset: 0;
      background-image: url("data:image/svg+xml,%3Csvg viewBox='0 0 256 256' xmlns='http://www.w3.org/2000/svg'%3E%3Cfilter id='noise'%3E%3CfeTurbulence type='fractalNoise' baseFrequency='0.9' numOctaves='4' stitchTiles='stitch'/%3E%3C/filter%3E%3Crect width='100%25' height='100%25' filter='url(%23noise)' opacity='0.04'/%3E%3C/svg%3E");
      pointer-events: none;
      z-index: 0;
      opacity: 0.4;
    }

    .container {
      width: 100%;
      max-width: 640px;
      position: relative;
      z-index: 1;
    }

    header {
      text-align: center;
      margin-bottom: 56px;
      animation: fadeDown 0.9s ease both;
    }

    header h1 {
      font-size: 2.6rem;
      font-weight: 300;
      letter-spacing: 0.18em;
      color: var(--text);
      text-transform: uppercase;
    }

    header p {
      font-style: italic;
      font-size: 1.05rem;
      color: var(--muted);
      margin-top: 8px;
      font-weight: 300;
    }



    .entry-area {
      position: relative;
      animation: fadeUp 0.9s 0.2s ease both;
    }

    textarea {
      width: 100%;
      min-height: 220px;
      background: var(--surface);
      border: 1px solid var(--border);
      color: var(--text);
      font-family: 'Cormorant Garamond', Georgia, serif;
      font-size: 1.15rem;
      font-weight: 300;
      line-height: 1.8;
      padding: 24px 28px;
      border-radius: 6px;
      resize: vertical;
      outline: none;
      transition: border-color 0.3s;
      letter-spacing: 0.01em;
    }

    textarea:focus { border-color: #3a3a4a; }
    textarea::placeholder { color: #333338; font-style: italic; }

    .char-hint {
      font-family: 'DM Mono', monospace;
      font-size: 0.68rem;
      color: #333338;
      text-align: right;
      margin-top: 6px;
      letter-spacing: 0.05em;
    }

    .submit-row {
      display: flex;
      justify-content: flex-end;
      margin-top: 16px;
      animation: fadeUp 0.9s 0.3s ease both;
    }

    .btn-submit {
      background: transparent;
      border: 1px solid var(--accent);
      color: var(--accent);
      font-family: 'DM Mono', monospace;
      font-size: 0.78rem;
      letter-spacing: 0.12em;
      text-transform: uppercase;
      padding: 12px 28px;
      border-radius: 4px;
      cursor: pointer;
      transition: all 0.25s;
      position: relative;
      overflow: hidden;
    }

    .btn-submit:hover {
      background: var(--accent);
      color: var(--bg);
    }

    .btn-submit:disabled {
      opacity: 0.35;
      cursor: not-allowed;
      background: transparent;
      color: var(--muted);
      border-color: var(--border);
    }

    /* loading dots */
    .dots span {
      display: inline-block;
      animation: blink 1.2s infinite;
      font-size: 1.2rem;
    }
    .dots span:nth-child(2) { animation-delay: 0.2s; }
    .dots span:nth-child(3) { animation-delay: 0.4s; }

    /* result card */
    .result {
      margin-top: 48px;
      animation: fadeUp 0.7s ease both;
    }

    .color-block {
      width: 100%;
      height: 120px;
      border-radius: 6px;
      transition: background 1s ease;
      position: relative;
      cursor: pointer;
      overflow: hidden;
    }

    .color-block::after {
      content: 'tap for breakdown';
      position: absolute;
      bottom: 12px;
      right: 16px;
      font-family: 'DM Mono', monospace;
      font-size: 0.65rem;
      letter-spacing: 0.1em;
      color: rgba(0,0,0,0.75);
      text-transform: uppercase;
      animation: labelPulse 2.5s ease-in-out infinite;
    }

    .rgb-tooltip {
      display: none;
      position: absolute;
      bottom: 0;
      left: 0;
      right: 0;
      background: rgba(0,0,0,0.55);
      backdrop-filter: blur(8px);
      padding: 16px 20px;
      font-family: 'DM Mono', monospace;
      font-size: 0.78rem;
      letter-spacing: 0.08em;
      color: rgba(255,255,255,0.85);
      animation: fadeUp 0.3s ease both;
    }

    .rgb-tooltip.visible { display: block; }

    .rgb-bars {
      display: flex;
      flex-direction: column;
      gap: 6px;
      margin-top: 8px;
    }

    .rgb-bar-row {
      display: flex;
      align-items: center;
      gap: 10px;
    }

    .rgb-label {
      width: 14px;
      font-size: 0.7rem;
      opacity: 0.7;
    }

    .rgb-track {
      flex: 1;
      height: 4px;
      background: rgba(255,255,255,0.1);
      border-radius: 2px;
      overflow: hidden;
    }

    .rgb-fill {
      height: 100%;
      border-radius: 2px;
      transition: width 1s ease;
    }

    .rgb-val {
      width: 28px;
      text-align: right;
      font-size: 0.68rem;
      opacity: 0.6;
    }

    .reflection {
      margin-top: 24px;
      padding: 24px 28px;
      background: var(--surface);
      border: 1px solid var(--border);
      border-radius: 6px;
    }

    .reflection-label {
      font-family: 'DM Mono', monospace;
      font-size: 0.65rem;
      letter-spacing: 0.14em;
      text-transform: uppercase;
      color: var(--muted);
      margin-bottom: 14px;
    }

    .reflection-text {
      font-size: 1.12rem;
      font-weight: 300;
      line-height: 1.85;
      color: var(--text);
      font-style: italic;
    }

    .discard-note {
      margin-top: 20px;
      text-align: center;
      font-family: 'DM Mono', monospace;
      font-size: 0.65rem;
      color: #2e2e32;
      letter-spacing: 0.1em;
      text-transform: uppercase;
    }

    .new-entry-btn {
      display: block;
      margin: 28px auto 0;
      background: transparent;
      border: 1px solid var(--border);
      color: var(--muted);
      font-family: 'DM Mono', monospace;
      font-size: 0.72rem;
      letter-spacing: 0.1em;
      text-transform: uppercase;
      padding: 10px 24px;
      border-radius: 4px;
      cursor: pointer;
      transition: all 0.2s;
    }

    .new-entry-btn:hover { border-color: var(--muted); color: var(--text); }

    .error-msg {
      margin-top: 20px;
      padding: 14px 18px;
      background: #1a1010;
      border: 1px solid #3a1a1a;
      border-radius: 4px;
      font-family: 'DM Mono', monospace;
      font-size: 0.75rem;
      color: #c07070;
      letter-spacing: 0.05em;
    }

    @keyframes labelPulse {
      0%, 100% { color: rgba(0,0,0,0.75); }
      50% { color: rgba(255,255,255,0.75); }
    }

    @keyframes fadeDown {
      from { opacity: 0; transform: translateY(-16px); }
      to   { opacity: 1; transform: translateY(0); }
    }

    @keyframes fadeUp {
      from { opacity: 0; transform: translateY(14px); }
      to   { opacity: 1; transform: translateY(0); }
    }

    @keyframes blink {
      0%, 80%, 100% { opacity: 0; }
      40% { opacity: 1; }
    }

    /* playlist offer */
    .playlist-offer {
      margin-top: 28px;
      padding: 24px 28px;
      background: #0c0c0d;
      border: 1px solid #222226;
      border-radius: 6px;
    }

    .playlist-label {
      font-family: 'DM Mono', monospace;
      font-size: 0.65rem;
      letter-spacing: 0.14em;
      text-transform: uppercase;
      color: var(--muted);
      margin-bottom: 8px;
    }

    .playlist-desc {
      font-style: italic;
      font-size: 1rem;
      color: #4a4a50;
      margin-bottom: 16px;
      font-weight: 300;
    }

    .playlist-btn {
      background: transparent;
      border: 1px solid #1DB954;
      color: #1DB954;
      font-family: 'DM Mono', monospace;
      font-size: 0.75rem;
      letter-spacing: 0.1em;
      text-transform: uppercase;
      padding: 10px 24px;
      border-radius: 4px;
      cursor: pointer;
      transition: all 0.25s;
    }

    .playlist-btn:hover {
      background: #1DB954;
      color: #000;
    }

    .playlist-btn:disabled {
      opacity: 0.4;
      cursor: not-allowed;
      background: transparent;
      color: var(--muted);
      border-color: var(--border);
    }

    .playlist-status {
      font-family: 'DM Mono', monospace;
      font-size: 0.7rem;
      color: var(--muted);
      margin-top: 14px;
      letter-spacing: 0.06em;
    }

    .playlist-result {
      margin-top: 20px;
    }

    .playlist-tracks {
      list-style: none;
      margin-top: 12px;
      max-height: 260px;
      overflow-y: auto;
      scrollbar-width: thin;
      scrollbar-color: #2a2a2e transparent;
    }

    .playlist-tracks li {
      display: flex;
      align-items: center;
      gap: 12px;
      padding: 8px 0;
      border-bottom: 1px solid #1a1a1e;
      font-size: 0.88rem;
    }

    .track-num {
      font-family: 'DM Mono', monospace;
      font-size: 0.6rem;
      color: #333338;
      width: 20px;
      text-align: right;
      flex-shrink: 0;
    }

    .track-info { flex: 1; min-width: 0; }

    .track-name {
      color: var(--text);
      font-weight: 400;
      white-space: nowrap;
      overflow: hidden;
      text-overflow: ellipsis;
    }

    .track-artist {
      font-size: 0.78rem;
      color: var(--muted);
      font-style: italic;
      white-space: nowrap;
      overflow: hidden;
      text-overflow: ellipsis;
    }

    .open-spotify-btn {
      display: inline-block;
      margin-top: 16px;
      background: #1DB954;
      color: #000;
      font-family: 'DM Mono', monospace;
      font-size: 0.72rem;
      letter-spacing: 0.1em;
      text-transform: uppercase;
      padding: 10px 24px;
      border-radius: 4px;
      text-decoration: none;
      transition: opacity 0.2s;
    }

    .open-spotify-btn:hover { opacity: 0.85; }


    /* playlist offer */
    .playlist-offer {
      margin-top: 28px;
      padding: 24px 28px;
      background: #0f0f10;
      border: 1px solid #1db954;
      border-radius: 6px;
    }

    .playlist-label {
      font-family: 'DM Mono', monospace;
      font-size: 0.65rem;
      letter-spacing: 0.14em;
      text-transform: uppercase;
      color: #1db954;
      margin-bottom: 8px;
    }

    .playlist-desc {
      font-size: 1rem;
      font-weight: 300;
      font-style: italic;
      color: var(--muted);
      margin-bottom: 16px;
    }

    .playlist-btn {
      background: #1db954;
      border: none;
      color: #000;
      font-family: 'DM Mono', monospace;
      font-size: 0.75rem;
      letter-spacing: 0.1em;
      text-transform: uppercase;
      padding: 11px 24px;
      border-radius: 4px;
      cursor: pointer;
      transition: all 0.2s;
      font-weight: 400;
    }

    .playlist-btn:hover { background: #17a349; }
    .playlist-btn:disabled { opacity: 0.4; cursor: not-allowed; }

    .playlist-status {
      margin-top: 14px;
      font-family: 'DM Mono', monospace;
      font-size: 0.72rem;
      color: var(--muted);
      letter-spacing: 0.06em;
    }

    .playlist-link {
      display: inline-block;
      margin-top: 14px;
      background: transparent;
      border: 1px solid #1db954;
      color: #1db954;
      font-family: 'DM Mono', monospace;
      font-size: 0.72rem;
      letter-spacing: 0.1em;
      text-transform: uppercase;
      padding: 10px 20px;
      border-radius: 4px;
      text-decoration: none;
      transition: all 0.2s;
    }
    .playlist-link:hover { background: #1db954; color: #000; }

    .playlist-tracks {
      margin-top: 16px;
      display: flex;
      flex-direction: column;
      gap: 6px;
      max-height: 220px;
      overflow-y: auto;
    }

    .track-row {
      display: flex;
      align-items: center;
      gap: 12px;
      padding: 6px 0;
      border-bottom: 1px solid #1a1a1e;
    }

    .track-num {
      font-family: 'DM Mono', monospace;
      font-size: 0.6rem;
      color: #2e2e32;
      width: 18px;
      text-align: right;
    }

    .track-info { flex: 1; }

    .track-name {
      font-size: 0.9rem;
      color: var(--text);
      font-weight: 300;
    }

    .track-artist {
      font-family: 'DM Mono', monospace;
      font-size: 0.62rem;
      color: var(--muted);
      margin-top: 2px;
    }
  </style>
</head>
<body>
<div class="container">

  <header>
    <h1>Chroma Diary</h1>
    <p>write freely. only color remains.</p>
  </header>



  <!-- Entry -->
  <div class="entry-area" id="entryArea">
    <textarea id="entry" placeholder="write whatever you need to write. it won't be saved." maxlength="2000" oninput="updateChar()"></textarea>
    <div class="char-hint"><span id="charCount">0</span> / 2000</div>
  </div>

  <div class="submit-row">
    <button class="btn-submit" id="submitBtn" onclick="submitEntry()">submit</button>
  </div>

  <div id="loadingArea" style="display:none; text-align:center; margin-top:40px;">
    <div class="dots" style="color:var(--muted); font-family:'DM Mono',monospace; font-size:0.8rem; letter-spacing:0.1em;">
      reading<span>.</span><span>.</span><span>.</span>
    </div>
  </div>

  <div id="errorArea"></div>
  <div id="resultArea"></div>

  <div style="text-align:center; margin-top:48px;">
    <a href="history.html" style="font-family:'DM Mono',monospace; font-size:0.68rem; letter-spacing:0.12em; text-transform:uppercase; color:#2e2e32; text-decoration:none; transition:color 0.2s;" onmouseover="this.style.color='#6b6868'" onmouseout="this.style.color='#2e2e32'">view history →</a>
  </div>

</div>

<script>
  let savedKey = '';
  let tooltipVisible = false;

  function updateChar() {
    const len = document.getElementById('entry').value.length;
    document.getElementById('charCount').textContent = len;
  }

  function toggleTooltip() {
    tooltipVisible = !tooltipVisible;
    const t = document.getElementById('rgbTooltip');
    if (tooltipVisible) t.classList.add('visible');
    else t.classList.remove('visible');
  }

  async function submitEntry() {
    const key = savedKey;

    const text = document.getElementById('entry').value.trim();
    if (!text) { showError('nothing to read yet.'); return; }

    document.getElementById('submitBtn').disabled = true;
    document.getElementById('loadingArea').style.display = 'block';
    document.getElementById('errorArea').innerHTML = '';
    document.getElementById('resultArea').innerHTML = '';

    const prompt = `You are reading someone's private diary entry. You must return exactly two lines.

Line 1: RGB: [number],[number],[number]
Line 2: REFLECTION: [2-4 warm honest sentences]

Red = rage (0-255)
Green = glee (0-255)
Blue = bleakness (0-255)

Example:
RGB: 120,80,200
REFLECTION: You carried something heavy today. That kind of weight does not just disappear, but you showed up anyway. There is something quietly brave in that.

Diary entry: ${text}`;
    try {
      // retry up to 3 times for flaky free models
      let data, raw = '';
      for (let attempt = 0; attempt < 3; attempt++) {
        if (attempt > 0) {
          setLoadingText('retrying...');
          await new Promise(r => setTimeout(r, 2000));
        }
        const res = await fetch('https://chromadiary-proxy.sotempyhehe.workers.dev', {
          method: 'POST',
          headers: { 'Content-Type': 'application/json' },
          body: JSON.stringify({ prompt })
        });
        data = await res.json();
        if (data.error) continue;
        raw = data?.choices?.[0]?.message?.content || '';
        if (raw) break;
      }
      if (!raw) throw new Error(data?.error?.message || 'no response after 3 attempts. try again.');

      // parse — very forgiving, handles any model output
      const cleaned = raw.replace(/```[a-z]*\n?/gi, '').trim();

      // try to find RGB anywhere in the response
      const rgbMatch = cleaned.match(/(?:RGB:?\s*)?(\d{1,3})[,\s]+(\d{1,3})[,\s]+(\d{1,3})/i);

      // try to find REFLECTION label, fallback to everything after first line
      let reflection = '';
      const reflMatch = cleaned.match(/REFLECTION:?\s*([\s\S]+)/i);
      if (reflMatch) {
        reflection = reflMatch[1].trim();
      } else {
        // just take everything that isn't the RGB line
        const lines = cleaned.split('\n').map(l => l.trim()).filter(l => l);
        const nonRGB = lines.filter(l => !l.match(/^\d{1,3}[,\s]+\d{1,3}[,\s]+\d{1,3}/) && !l.match(/^RGB/i));
        reflection = nonRGB.join(' ').trim();
      }

      // last resort fallback reflection
      if (!reflection) reflection = 'Something in these words carries weight. Sit with it.';

      if (!rgbMatch) throw new Error('format error: ' + cleaned.substring(0, 200));

      const r = Math.min(255, parseInt(rgbMatch[1]));
      const g = Math.min(255, parseInt(rgbMatch[2]));
      const b = Math.min(255, parseInt(rgbMatch[3]));
      // reflection handled above

      // scale to 0-100 for display
      const r100 = Math.round(r / 255 * 100);
      const g100 = Math.round(g / 255 * 100);
      const b100 = Math.round(b / 255 * 100);

      // save to localStorage
      const entry = {
        timestamp: new Date().toISOString(),
        r, g, b, r100, g100, b100,
        reflection
      };
      const history = JSON.parse(localStorage.getItem('chroma_history') || '[]');
      history.unshift(entry);
      localStorage.setItem('chroma_history', JSON.stringify(history));

      showResult(r, g, b, r100, g100, b100, reflection);

      // clear the textarea
      document.getElementById('entry').value = '';
      document.getElementById('charCount').textContent = '0';

    } catch (e) {
      showError(e.message);
    } finally {
      document.getElementById('loadingArea').style.display = 'none';
      document.getElementById('submitBtn').disabled = false;
    }
  }

  function showResult(r, g, b, r100, g100, b100, reflection) {
    const html = `
      <div class="result">
        <div class="color-block" style="background: rgb(${r},${g},${b})" onclick="toggleTooltip()">
          <div class="rgb-tooltip" id="rgbTooltip">
            <div style="font-size:0.65rem; opacity:0.5; margin-bottom:10px; letter-spacing:0.12em;">TODAY'S EMOTIONAL SPECTRUM</div>
            <div class="rgb-bars">
              <div class="rgb-bar-row">
                <span class="rgb-label">R</span>
                <div class="rgb-track"><div class="rgb-fill" style="width:${r100}%; background:rgba(255,100,100,0.8)"></div></div>
                <span class="rgb-val">${r100}</span>
              </div>
              <div class="rgb-bar-row">
                <span class="rgb-label">G</span>
                <div class="rgb-track"><div class="rgb-fill" style="width:${g100}%; background:rgba(100,200,130,0.8)"></div></div>
                <span class="rgb-val">${g100}</span>
              </div>
              <div class="rgb-bar-row">
                <span class="rgb-label">B</span>
                <div class="rgb-track"><div class="rgb-fill" style="width:${b100}%; background:rgba(100,150,255,0.8)"></div></div>
                <span class="rgb-val">${b100}</span>
              </div>
            </div>
            <div style="margin-top:10px; font-size:0.62rem; opacity:0.35;">R = Rage · G = Glee · B = Bleakness</div>
          </div>
        </div>

        <div class="reflection">
          <div class="reflection-label">reflection</div>
          <div class="reflection-text">${reflection}</div>
        </div>

        <div class="playlist-offer" id="playlistOffer">
          <div class="playlist-label">today's soundtrack</div>
          <p class="playlist-desc">let your mood shape a playlist.</p>
          <button class="playlist-btn" id="makePlaylistBtn" onclick="generateSongs(${r}, ${g}, ${b})">make my playlist</button>
          <div id="playlistStatus"></div>
          <div id="playlistResult"></div>
        </div>

        <div class="discard-note">your entry has been released</div>
        <button class="new-entry-btn" onclick="newEntry()">new entry</button>
      </div>
    `;
    document.getElementById('resultArea').innerHTML = html;
    tooltipVisible = false;
  }

  function setLoadingText(msg) {
    const el = document.querySelector('.dots');
    if (el) el.innerHTML = msg;
  }

  function showError(msg) {
    document.getElementById('errorArea').innerHTML = `<div class="error-msg">${msg}</div>`;
  }

  function newEntry() {
    document.getElementById('resultArea').innerHTML = '';
    document.getElementById('errorArea').innerHTML = '';
    document.getElementById('entry').focus();
  }

  // ── Spotify Integration ──────────────────────────────────────────
  const SPOTIFY_CLIENT_ID = 'a7372f28a179435ea2a02ad59b59f2b2';
  const SPOTIFY_REDIRECT = 'https://notkle.github.io/chromadiary/callback.html';
  const SPOTIFY_SCOPES = 'playlist-modify-public playlist-modify-private';
  const WORKER_URL = 'https://chromadiary-proxy.sotempyhehe.workers.dev';

  let spotifyToken = localStorage.getItem('spotify_token') || null;
  let spotifyTokenExpiry = parseInt(localStorage.getItem('spotify_token_expiry') || '0');
  let spotifyRefreshToken = localStorage.getItem('spotify_refresh_token') || null;
  let pendingRGB = null;

  // receive token from callback popup
  window.addEventListener('message', function(e) {
    if (e.data && e.data.type === 'spotify_token') {
      spotifyToken = e.data.access_token;
      spotifyTokenExpiry = Date.now() + e.data.expires_in * 1000;
      spotifyRefreshToken = e.data.refresh_token;
      localStorage.setItem('spotify_token', spotifyToken);
      localStorage.setItem('spotify_token_expiry', spotifyTokenExpiry);
      localStorage.setItem('spotify_refresh_token', spotifyRefreshToken);
      if (pendingRGB) {
        buildPlaylist(pendingRGB.r, pendingRGB.g, pendingRGB.b);
        pendingRGB = null;
      }
    }
  });

  function isTokenValid() {
    return spotifyToken && Date.now() < spotifyTokenExpiry - 60000;
  }

  async function refreshSpotifyToken() {
    if (!spotifyRefreshToken) return false;
    try {
      const res = await fetch(WORKER_URL, {
        method: 'POST',
        headers: { 'Content-Type': 'application/json' },
        body: JSON.stringify({ action: 'spotify_refresh', refresh_token: spotifyRefreshToken })
      });
      const data = await res.json();
      if (data.access_token) {
        spotifyToken = data.access_token;
        spotifyTokenExpiry = Date.now() + (data.expires_in || 3600) * 1000;
        if (data.refresh_token) spotifyRefreshToken = data.refresh_token;
        localStorage.setItem('spotify_token', spotifyToken);
        localStorage.setItem('spotify_token_expiry', spotifyTokenExpiry);
        localStorage.setItem('spotify_refresh_token', spotifyRefreshToken);
        return true;
      }
    } catch(e) {}
    return false;
  }

  async function initiateSpotify(r, g, b) {
    // try silent refresh first
    if (!isTokenValid() && spotifyRefreshToken) {
      setPlaylistStatus('reconnecting to spotify...');
      const refreshed = await refreshSpotifyToken();
      if (refreshed) {
        buildPlaylist(r, g, b);
        return;
      }
    }

    if (isTokenValid()) {
      buildPlaylist(r, g, b);
    } else {
      pendingRGB = { r, g, b };
      setPlaylistStatus('connecting to spotify...');
      const authUrl = 'https://accounts.spotify.com/authorize' +
        '?client_id=' + SPOTIFY_CLIENT_ID +
        '&response_type=code' +
        '&redirect_uri=' + encodeURIComponent(SPOTIFY_REDIRECT) +
        '&scope=' + encodeURIComponent(SPOTIFY_SCOPES) +
        '&show_dialog=false';
      const popup = window.open(authUrl, 'spotify_auth', 'width=500,height=700');
      if (!popup) {
        setPlaylistStatus('popup blocked — please allow popups for this site.');
      }
    }
  }

  function setPlaylistStatus(msg) {
    const el = document.getElementById('playlistStatus');
    if (el) el.innerHTML = msg ? '<div class="playlist-status">' + msg + '</div>' : '';
  }

  // stored songs for deferred spotify save
  let pendingSongs = [];
  let pendingRGBVals = null;

  async function generateSongs(r, g, b) {
    const btn = document.getElementById('makePlaylistBtn');
    if (btn) btn.disabled = true;
    setPlaylistStatus('asking ai for song recommendations...');

    const r100 = Math.round(r / 255 * 100);
    const g100 = Math.round(g / 255 * 100);
    const b100 = Math.round(b / 255 * 100);

    const songPrompt = `You are a deeply thoughtful music curator. Based on someone's emotional state, recommend exactly 15 songs for a Spotify playlist.

Their emotional metrics today (each 0-100):
- Rage: ${r100}/100 (emotional intensity, agitation, heat)
- Glee: ${g100}/100 (lightness, joy, warmth)
- Bleakness: ${b100}/100 (heaviness, weight, quiet sorrow)

Philosophy: The playlist should COMPLEMENT and gently accompany these emotions, not match them literally or try to fix them. High rage doesn't mean aggressive music — it means music that meets the heat and gives it somewhere to breathe. High bleakness means music that sits with the feeling honestly, in an inquiring way, not hopeless. Think of it as companionship for the emotion.

Return ONLY a JSON array of 15 objects, nothing else, no markdown, no explanation:
[{"title": "Song Title", "artist": "Artist Name"}, ...]`;

    let songs = [];
    try {
      const playlistModels = ['nvidia/nemotron-3-super-120b-a12b:free', 'arcee-ai/trinity-large-preview:free'];
      let raw = '';
      for (const pm of playlistModels) {
        const res = await fetch(WORKER_URL, {
          method: 'POST',
          headers: { 'Content-Type': 'application/json' },
          body: JSON.stringify({ prompt: songPrompt, model: pm })
        });
        const data = await res.json();
        raw = data?.choices?.[0]?.message?.content || '';
        if (raw) break;
      }
      const cleaned = raw.replace(/```json|```/g, '').trim();
      songs = JSON.parse(cleaned);
    } catch(e) {
      setPlaylistStatus('could not generate song list. try again.');
      if (btn) btn.disabled = false;
      return;
    }

    pendingSongs = songs;
    pendingRGBVals = { r, g, b, r100, g100, b100 };

    // show track list with open in spotify button
    const trackHTML = songs.map((t, i) => `
      <div class="track-row">
        <span class="track-num">${i + 1}</span>
        <div class="track-info">
          <div class="track-name">${t.title}</div>
          <div class="track-artist">${t.artist}</div>
        </div>
      </div>
    `).join('');

    const resultEl = document.getElementById('playlistResult');
    if (resultEl) {
      resultEl.innerHTML = `
        <div class="playlist-tracks">${trackHTML}</div>
        <button class="playlist-btn" style="margin-top:16px;" onclick="initiateSpotify(${r}, ${g}, ${b})">open in spotify →</button>
      `;
    }
    setPlaylistStatus('');
    if (btn) btn.disabled = false;
  }

  function initiateSpotify(r, g, b) {
    if (isTokenValid()) {
      saveToSpotify(r, g, b);
    } else if (spotifyRefreshToken) {
      setPlaylistStatus('reconnecting to spotify...');
      refreshSpotifyToken().then(ok => {
        if (ok) saveToSpotify(r, g, b);
        else openSpotifyAuth(r, g, b);
      });
    } else {
      openSpotifyAuth(r, g, b);
    }
  }

  function openSpotifyAuth(r, g, b) {
    pendingRGB = { r, g, b };
    setPlaylistStatus('connecting to spotify...');
    const authUrl = 'https://accounts.spotify.com/authorize' +
      '?client_id=' + SPOTIFY_CLIENT_ID +
      '&response_type=code' +
      '&redirect_uri=' + encodeURIComponent(SPOTIFY_REDIRECT) +
      '&scope=' + encodeURIComponent(SPOTIFY_SCOPES) +
      '&show_dialog=false';
    const popup = window.open(authUrl, 'spotify_auth', 'width=500,height=700');
    if (!popup) setPlaylistStatus('popup blocked — please allow popups for this site.');
  }

  async function saveToSpotify(r, g, b) {
    const r100 = Math.round(r / 255 * 100);
    const g100 = Math.round(g / 255 * 100);
    const b100 = Math.round(b / 255 * 100);

    setPlaylistStatus('searching spotify for tracks...');

    const trackIds = [];
    for (const song of pendingSongs.slice(0, 15)) {
      try {
        const q = encodeURIComponent(song.title + ' ' + song.artist);
        const r2 = await fetch('https://api.spotify.com/v1/search?q=' + q + '&type=track&limit=1', {
          headers: { 'Authorization': 'Bearer ' + spotifyToken }
        });
        const d = await r2.json();
        const track = d?.tracks?.items?.[0];
        if (track) trackIds.push(track.uri);
      } catch(e) { /* skip */ }
    }

    if (trackIds.length === 0) {
      setPlaylistStatus('no tracks found. try again.');
      return;
    }

    setPlaylistStatus('creating your playlist...');

    let userId;
    try {
      const meRes = await fetch('https://api.spotify.com/v1/me', {
        headers: { 'Authorization': 'Bearer ' + spotifyToken }
      });
      const me = await meRes.json();
      userId = me.id;
    } catch(e) {
      setPlaylistStatus('could not connect to spotify account.');
      return;
    }

    let playlistId, playlistUrl;
    try {
      const today = new Date().toLocaleDateString('en-US', { month: 'long', day: 'numeric' });
      const cpRes = await fetch('https://api.spotify.com/v1/users/' + userId + '/playlists', {
        method: 'POST',
        headers: { 'Authorization': 'Bearer ' + spotifyToken, 'Content-Type': 'application/json' },
        body: JSON.stringify({
          name: 'Chroma Diary · ' + today,
          description: 'Rage ' + r100 + ' · Glee ' + g100 + ' · Bleakness ' + b100 + ' · Made with Chroma Diary',
          public: false
        })
      });
      const cp = await cpRes.json();
      console.log('playlist creation response:', JSON.stringify(cp));
      playlistId = cp.id || (cp.snapshot_id ? null : null);
      playlistUrl = (cp.external_urls && cp.external_urls.spotify) 
        ? cp.external_urls.spotify 
        : (cp.id ? 'https://open.spotify.com/playlist/' + cp.id : null);
      if (!playlistId) throw new Error('playlist creation failed: ' + JSON.stringify(cp));
    } catch(e) {
      setPlaylistStatus('could not create playlist.');
      return;
    }

    try {
      await fetch('https://api.spotify.com/v1/playlists/' + playlistId + '/tracks', {
        method: 'POST',
        headers: { 'Authorization': 'Bearer ' + spotifyToken, 'Content-Type': 'application/json' },
        body: JSON.stringify({ uris: trackIds })
      });
    } catch(e) { /* best effort */ }

    setPlaylistStatus('playlist ready ✓');

    // open directly in spotify web player (app will intercept if installed)
    window.open(playlistUrl, '_blank');
  }

</script>
