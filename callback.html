<!DOCTYPE html>
<html>
<head>
  <meta charset="UTF-8"/>
  <title>Chroma Diary · Connecting...</title>
  <style>
    body {
      background: #0e0e0f;
      color: #6b6868;
      font-family: monospace;
      display: flex;
      align-items: center;
      justify-content: center;
      height: 100vh;
      margin: 0;
      font-size: 0.8rem;
      letter-spacing: 0.1em;
    }
  </style>
</head>
<body>
  <div>connecting to spotify...</div>
  <script>
    const hash = window.location.hash.substring(1);
    const params = {};
    hash.split('&').forEach(pair => {
      const [k, v] = pair.split('=');
      params[decodeURIComponent(k)] = decodeURIComponent(v || '');
    });

    if (params.access_token) {
      if (window.opener) {
        window.opener.postMessage({
          type: 'spotify_token',
          access_token: params.access_token,
          expires_in: parseInt(params.expires_in || '3600')
        }, '*');
      }
      document.querySelector('div').textContent = 'connected. closing...';
      setTimeout(() => window.close(), 1200);
    } else {
      document.querySelector('div').textContent = 'something went wrong. please try again.';
    }
  </script>
</body>
</html>
