<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0"/>
  <title>Chroma Diary</title>
  <link href="https://fonts.googleapis.com/css2?family=Cormorant+Garamond:ital,wght@0,300;0,400;1,300;1,400&family=DM+Mono:wght@300;400&display=swap" rel="stylesheet"/>
  <style>
    *, *::before, *::after { box-sizing: border-box; margin: 0; padding: 0; }

    :root {
      --bg: #0e0e0f;
      --surface: #141415;
      --border: #2a2a2e;
      --text: #e8e4dc;
      --muted: #6b6868;
      --accent: #c9b99a;
    }

    body {
      background: var(--bg);
      color: var(--text);
      font-family: 'Cormorant Garamond', Georgia, serif;
      min-height: 100vh;
      display: flex;
      flex-direction: column;
      align-items: center;
      justify-content: flex-start;
      padding: 60px 20px 80px;
      position: relative;
      overflow-x: hidden;
    }

    /* subtle grain overlay */
    body::before {
      content: '';
      position: fixed;
      inset: 0;
      background-image: url("data:image/svg+xml,%3Csvg viewBox='0 0 256 256' xmlns='http://www.w3.org/2000/svg'%3E%3Cfilter id='noise'%3E%3CfeTurbulence type='fractalNoise' baseFrequency='0.9' numOctaves='4' stitchTiles='stitch'/%3E%3C/filter%3E%3Crect width='100%25' height='100%25' filter='url(%23noise)' opacity='0.04'/%3E%3C/svg%3E");
      pointer-events: none;
      z-index: 0;
      opacity: 0.4;
    }

    .container {
      width: 100%;
      max-width: 640px;
      position: relative;
      z-index: 1;
    }

    header {
      text-align: center;
      margin-bottom: 56px;
      animation: fadeDown 0.9s ease both;
    }

    header h1 {
      font-size: 2.6rem;
      font-weight: 300;
      letter-spacing: 0.18em;
      color: var(--text);
      text-transform: uppercase;
    }

    header p {
      font-style: italic;
      font-size: 1.05rem;
      color: var(--muted);
      margin-top: 8px;
      font-weight: 300;
    }



    .entry-area {
      position: relative;
      animation: fadeUp 0.9s 0.2s ease both;
    }

    textarea {
      width: 100%;
      min-height: 220px;
      background: var(--surface);
      border: 1px solid var(--border);
      color: var(--text);
      font-family: 'Cormorant Garamond', Georgia, serif;
      font-size: 1.15rem;
      font-weight: 300;
      line-height: 1.8;
      padding: 24px 28px;
      border-radius: 6px;
      resize: vertical;
      outline: none;
      transition: border-color 0.3s;
      letter-spacing: 0.01em;
    }

    textarea:focus { border-color: #3a3a4a; }
    textarea::placeholder { color: #333338; font-style: italic; }

    .char-hint {
      font-family: 'DM Mono', monospace;
      font-size: 0.68rem;
      color: #333338;
      text-align: right;
      margin-top: 6px;
      letter-spacing: 0.05em;
    }

    .submit-row {
      display: flex;
      justify-content: flex-end;
      margin-top: 16px;
      animation: fadeUp 0.9s 0.3s ease both;
    }

    .btn-submit {
      background: transparent;
      border: 1px solid var(--accent);
      color: var(--accent);
      font-family: 'DM Mono', monospace;
      font-size: 0.78rem;
      letter-spacing: 0.12em;
      text-transform: uppercase;
      padding: 12px 28px;
      border-radius: 4px;
      cursor: pointer;
      transition: all 0.25s;
      position: relative;
      overflow: hidden;
    }

    .btn-submit:hover {
      background: var(--accent);
      color: var(--bg);
    }

    .btn-submit:disabled {
      opacity: 0.35;
      cursor: not-allowed;
      background: transparent;
      color: var(--muted);
      border-color: var(--border);
    }

    /* loading dots */
    .dots span {
      display: inline-block;
      animation: blink 1.2s infinite;
      font-size: 1.2rem;
    }
    .dots span:nth-child(2) { animation-delay: 0.2s; }
    .dots span:nth-child(3) { animation-delay: 0.4s; }

    /* result card */
    .result {
      margin-top: 48px;
      animation: fadeUp 0.7s ease both;
    }

    .color-block {
      width: 100%;
      height: 120px;
      border-radius: 6px;
      transition: background 1s ease;
      position: relative;
      cursor: pointer;
      overflow: hidden;
    }

    .color-block::after {
      content: 'tap for breakdown';
      position: absolute;
      bottom: 12px;
      right: 16px;
      font-family: 'DM Mono', monospace;
      font-size: 0.65rem;
      letter-spacing: 0.1em;
      color: rgba(255,255,255,0.35);
      text-transform: uppercase;
    }

    .rgb-tooltip {
      display: none;
      position: absolute;
      bottom: 0;
      left: 0;
      right: 0;
      background: rgba(0,0,0,0.55);
      backdrop-filter: blur(8px);
      padding: 16px 20px;
      font-family: 'DM Mono', monospace;
      font-size: 0.78rem;
      letter-spacing: 0.08em;
      color: rgba(255,255,255,0.85);
      animation: fadeUp 0.3s ease both;
    }

    .rgb-tooltip.visible { display: block; }

    .rgb-bars {
      display: flex;
      flex-direction: column;
      gap: 6px;
      margin-top: 8px;
    }

    .rgb-bar-row {
      display: flex;
      align-items: center;
      gap: 10px;
    }

    .rgb-label {
      width: 14px;
      font-size: 0.7rem;
      opacity: 0.7;
    }

    .rgb-track {
      flex: 1;
      height: 4px;
      background: rgba(255,255,255,0.1);
      border-radius: 2px;
      overflow: hidden;
    }

    .rgb-fill {
      height: 100%;
      border-radius: 2px;
      transition: width 1s ease;
    }

    .rgb-val {
      width: 28px;
      text-align: right;
      font-size: 0.68rem;
      opacity: 0.6;
    }

    .reflection {
      margin-top: 24px;
      padding: 24px 28px;
      background: var(--surface);
      border: 1px solid var(--border);
      border-radius: 6px;
    }

    .reflection-label {
      font-family: 'DM Mono', monospace;
      font-size: 0.65rem;
      letter-spacing: 0.14em;
      text-transform: uppercase;
      color: var(--muted);
      margin-bottom: 14px;
    }

    .reflection-text {
      font-size: 1.12rem;
      font-weight: 300;
      line-height: 1.85;
      color: var(--text);
      font-style: italic;
    }

    .discard-note {
      margin-top: 20px;
      text-align: center;
      font-family: 'DM Mono', monospace;
      font-size: 0.65rem;
      color: #2e2e32;
      letter-spacing: 0.1em;
      text-transform: uppercase;
    }

    .new-entry-btn {
      display: block;
      margin: 28px auto 0;
      background: transparent;
      border: 1px solid var(--border);
      color: var(--muted);
      font-family: 'DM Mono', monospace;
      font-size: 0.72rem;
      letter-spacing: 0.1em;
      text-transform: uppercase;
      padding: 10px 24px;
      border-radius: 4px;
      cursor: pointer;
      transition: all 0.2s;
    }

    .new-entry-btn:hover { border-color: var(--muted); color: var(--text); }

    .error-msg {
      margin-top: 20px;
      padding: 14px 18px;
      background: #1a1010;
      border: 1px solid #3a1a1a;
      border-radius: 4px;
      font-family: 'DM Mono', monospace;
      font-size: 0.75rem;
      color: #c07070;
      letter-spacing: 0.05em;
    }

    @keyframes fadeDown {
      from { opacity: 0; transform: translateY(-16px); }
      to   { opacity: 1; transform: translateY(0); }
    }

    @keyframes fadeUp {
      from { opacity: 0; transform: translateY(14px); }
      to   { opacity: 1; transform: translateY(0); }
    }

    @keyframes blink {
      0%, 80%, 100% { opacity: 0; }
      40% { opacity: 1; }
    }
  </style>
</head>
<body>
<div class="container">

  <header>
    <h1>Chroma Diary</h1>
    <p>write freely. only color remains.</p>
  </header>



  <!-- Entry -->
  <div class="entry-area" id="entryArea">
    <textarea id="entry" placeholder="write whatever you need to write. it won't be saved." maxlength="2000" oninput="updateChar()"></textarea>
    <div class="char-hint"><span id="charCount">0</span> / 2000</div>
  </div>

  <div class="submit-row">
    <button class="btn-submit" id="submitBtn" onclick="submitEntry()">submit</button>
  </div>

  <div id="loadingArea" style="display:none; text-align:center; margin-top:40px;">
    <div class="dots" style="color:var(--muted); font-family:'DM Mono',monospace; font-size:0.8rem; letter-spacing:0.1em;">
      reading<span>.</span><span>.</span><span>.</span>
    </div>
  </div>

  <div id="errorArea"></div>
  <div id="resultArea"></div>

  <div style="text-align:center; margin-top:48px;">
    <a href="history.html" style="font-family:'DM Mono',monospace; font-size:0.68rem; letter-spacing:0.12em; text-transform:uppercase; color:#2e2e32; text-decoration:none; transition:color 0.2s;" onmouseover="this.style.color='#6b6868'" onmouseout="this.style.color='#2e2e32'">view history →</a>
  </div>

</div>

<script>
  let savedKey = '';
  let tooltipVisible = false;

  function updateChar() {
    const len = document.getElementById('entry').value.length;
    document.getElementById('charCount').textContent = len;
  }

  function toggleTooltip() {
    tooltipVisible = !tooltipVisible;
    const t = document.getElementById('rgbTooltip');
    if (tooltipVisible) t.classList.add('visible');
    else t.classList.remove('visible');
  }

  async function submitEntry() {
    const key = savedKey;

    const text = document.getElementById('entry').value.trim();
    if (!text) { showError('nothing to read yet.'); return; }

    document.getElementById('submitBtn').disabled = true;
    document.getElementById('loadingArea').style.display = 'block';
    document.getElementById('errorArea').innerHTML = '';
    document.getElementById('resultArea').innerHTML = '';

    const prompt = `You are reading someone's private diary entry. You must return exactly two lines.

Line 1: RGB: [number],[number],[number]
Line 2: REFLECTION: [2-4 warm honest sentences]

Red = rage (0-255)
Green = glad (0-255)
Blue = bleak (0-255)

Example:
RGB: 120,80,200
REFLECTION: You carried something heavy today. That kind of weight does not just disappear, but you showed up anyway. There is something quietly brave in that.

Diary entry: ${text}`;
    try {
      const res = await fetch('https://chromadiary-proxy.sotempyhehe.workers.dev', {
          method: 'POST',
          headers: { 'Content-Type': 'application/json' },
          body: JSON.stringify({ prompt })
        }
      );

      if (!res.ok) {
        const err = await res.json();
        throw new Error(err?.error?.message || `API error ${res.status}`);
      }

      const data = await res.json();
      if (data.error) throw new Error(data.error.message || JSON.stringify(data.error));
      const raw = data?.choices?.[0]?.message?.content || '';

      // parse RGB — strip markdown fences, be flexible with separators
      const cleaned = raw.replace(/```[a-z]*\n?/gi, '').trim();
      const rgbMatch = cleaned.match(/RGB:\s*(\d+)[,\s]+(\d+)[,\s]+(\d+)/i);
      const reflMatch = cleaned.match(/REFLECTION:\s*([\s\S]+)/i);

      // fallback: if no REFLECTION label, take everything after the RGB line
      let reflection = '';
      if (reflMatch) {
        reflection = reflMatch[1].trim();
      } else {
        const afterRGB = cleaned.replace(/RGB:\s*\d+[,\s]+\d+[,\s]+\d+/i, '').trim();
        reflection = afterRGB;
      }

      if (!rgbMatch || !reflection) throw new Error('format error: ' + cleaned.substring(0, 200));

      const r = Math.min(255, parseInt(rgbMatch[1]));
      const g = Math.min(255, parseInt(rgbMatch[2]));
      const b = Math.min(255, parseInt(rgbMatch[3]));
      // reflection handled above

      // scale to 0-100 for display
      const r100 = Math.round(r / 255 * 100);
      const g100 = Math.round(g / 255 * 100);
      const b100 = Math.round(b / 255 * 100);

      // save to localStorage
      const entry = {
        timestamp: new Date().toISOString(),
        r, g, b, r100, g100, b100,
        reflection
      };
      const history = JSON.parse(localStorage.getItem('chroma_history') || '[]');
      history.unshift(entry);
      localStorage.setItem('chroma_history', JSON.stringify(history));

      showResult(r, g, b, r100, g100, b100, reflection);

      // clear the textarea
      document.getElementById('entry').value = '';
      document.getElementById('charCount').textContent = '0';

    } catch (e) {
      showError(e.message);
    } finally {
      document.getElementById('loadingArea').style.display = 'none';
      document.getElementById('submitBtn').disabled = false;
    }
  }

  function showResult(r, g, b, r100, g100, b100, reflection) {
    const html = `
      <div class="result">
        <div class="color-block" style="background: rgb(${r},${g},${b})" onclick="toggleTooltip()">
          <div class="rgb-tooltip" id="rgbTooltip">
            <div style="font-size:0.65rem; opacity:0.5; margin-bottom:10px; letter-spacing:0.12em;">TODAY'S EMOTIONAL SPECTRUM</div>
            <div class="rgb-bars">
              <div class="rgb-bar-row">
                <span class="rgb-label">R</span>
                <div class="rgb-track"><div class="rgb-fill" style="width:${r100}%; background:rgba(255,100,100,0.8)"></div></div>
                <span class="rgb-val">${r100}</span>
              </div>
              <div class="rgb-bar-row">
                <span class="rgb-label">G</span>
                <div class="rgb-track"><div class="rgb-fill" style="width:${g100}%; background:rgba(100,200,130,0.8)"></div></div>
                <span class="rgb-val">${g100}</span>
              </div>
              <div class="rgb-bar-row">
                <span class="rgb-label">B</span>
                <div class="rgb-track"><div class="rgb-fill" style="width:${b100}%; background:rgba(100,150,255,0.8)"></div></div>
                <span class="rgb-val">${b100}</span>
              </div>
            </div>
            <div style="margin-top:10px; font-size:0.62rem; opacity:0.35;">R = rage · G = glad · B = bleak</div>
          </div>
        </div>

        <div class="reflection">
          <div class="reflection-label">reflection</div>
          <div class="reflection-text">${reflection}</div>
        </div>

        <div class="discard-note">your entry has been released</div>

        <button class="new-entry-btn" onclick="newEntry()">new entry</button>
      </div>
    `;
    document.getElementById('resultArea').innerHTML = html;
    tooltipVisible = false;
  }

  function showError(msg) {
    document.getElementById('errorArea').innerHTML = `<div class="error-msg">${msg}</div>`;
  }

  function newEntry() {
    document.getElementById('resultArea').innerHTML = '';
    document.getElementById('errorArea').innerHTML = '';
    document.getElementById('entry').focus();
  }
</script>
</body>
</html>
