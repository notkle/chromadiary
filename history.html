<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8"/>
  <meta name="viewport" content="width=device-width, initial-scale=1.0"/>
  <title>Chroma Diary — History</title>
  <link href="https://fonts.googleapis.com/css2?family=Cormorant+Garamond:ital,wght@0,300;0,400;1,300;1,400&family=DM+Mono:wght@300;400&display=swap" rel="stylesheet"/>
  <style>
    *, *::before, *::after { box-sizing: border-box; margin: 0; padding: 0; }

    :root {
      --bg: #0e0e0f;
      --surface: #141415;
      --border: #2a2a2e;
      --text: #e8e4dc;
      --muted: #6b6868;
      --accent: #c9b99a;
    }

    body {
      background: var(--bg);
      color: var(--text);
      font-family: 'Cormorant Garamond', Georgia, serif;
      min-height: 100vh;
      padding: 60px 20px 80px;
      position: relative;
      overflow-x: hidden;
    }

    body::before {
      content: '';
      position: fixed;
      inset: 0;
      background-image: url("data:image/svg+xml,%3Csvg viewBox='0 0 256 256' xmlns='http://www.w3.org/2000/svg'%3E%3Cfilter id='noise'%3E%3CfeTurbulence type='fractalNoise' baseFrequency='0.9' numOctaves='4' stitchTiles='stitch'/%3E%3C/filter%3E%3Crect width='100%25' height='100%25' filter='url(%23noise)' opacity='0.04'/%3E%3C/svg%3E");
      pointer-events: none;
      z-index: 0;
      opacity: 0.4;
    }

    .container {
      width: 100%;
      max-width: 720px;
      margin: 0 auto;
      position: relative;
      z-index: 1;
    }

    header {
      text-align: center;
      margin-bottom: 56px;
      animation: fadeDown 0.9s ease both;
    }

    header h1 {
      font-size: 2.6rem;
      font-weight: 300;
      letter-spacing: 0.18em;
      text-transform: uppercase;
    }

    header p {
      font-style: italic;
      font-size: 1.05rem;
      color: var(--muted);
      margin-top: 8px;
    }

    .back {
      display: inline-block;
      margin-bottom: 40px;
      font-family: 'DM Mono', monospace;
      font-size: 0.68rem;
      letter-spacing: 0.12em;
      text-transform: uppercase;
      color: var(--muted);
      text-decoration: none;
      transition: color 0.2s;
      animation: fadeUp 0.9s ease both;
    }
    .back:hover { color: var(--text); }

    .empty {
      text-align: center;
      font-style: italic;
      color: var(--muted);
      margin-top: 80px;
      font-size: 1.1rem;
      animation: fadeUp 0.9s ease both;
    }

    /* color grid */
    .grid {
      display: grid;
      grid-template-columns: repeat(auto-fill, minmax(80px, 1fr));
      gap: 8px;
      margin-bottom: 60px;
      animation: fadeUp 0.9s 0.1s ease both;
    }

    .swatch {
      aspect-ratio: 1;
      border-radius: 4px;
      cursor: pointer;
      position: relative;
      transition: transform 0.2s, box-shadow 0.2s;
    }

    .swatch:hover {
      transform: scale(1.06);
      box-shadow: 0 4px 20px rgba(0,0,0,0.4);
    }

    .swatch.active {
      transform: scale(1.06);
      box-shadow: 0 0 0 2px var(--accent);
    }

    .swatch-date {
      position: absolute;
      bottom: 4px;
      left: 0;
      right: 0;
      text-align: center;
      font-family: 'DM Mono', monospace;
      font-size: 0.5rem;
      color: rgba(255,255,255,0.5);
      letter-spacing: 0.05em;
    }

    /* detail panel */
    .detail {
      display: none;
      background: var(--surface);
      border: 1px solid var(--border);
      border-radius: 6px;
      padding: 32px;
      margin-bottom: 40px;
      animation: fadeUp 0.4s ease both;
    }

    .detail.visible { display: block; }

    .detail-header {
      display: flex;
      align-items: center;
      gap: 20px;
      margin-bottom: 24px;
    }

    .detail-swatch {
      width: 64px;
      height: 64px;
      border-radius: 4px;
      flex-shrink: 0;
    }

    .detail-meta {
      flex: 1;
    }

    .detail-date {
      font-family: 'DM Mono', monospace;
      font-size: 0.72rem;
      letter-spacing: 0.1em;
      color: var(--muted);
      text-transform: uppercase;
      margin-bottom: 6px;
    }

    .detail-rgb-label {
      font-family: 'DM Mono', monospace;
      font-size: 0.65rem;
      color: #3a3a3e;
      letter-spacing: 0.08em;
    }

    .rgb-bars {
      display: flex;
      flex-direction: column;
      gap: 8px;
      margin-bottom: 24px;
    }

    .rgb-bar-row {
      display: flex;
      align-items: center;
      gap: 10px;
    }

    .rgb-label {
      font-family: 'DM Mono', monospace;
      font-size: 0.7rem;
      width: 14px;
      opacity: 0.6;
    }

    .rgb-track {
      flex: 1;
      height: 4px;
      background: rgba(255,255,255,0.06);
      border-radius: 2px;
      overflow: hidden;
    }

    .rgb-fill {
      height: 100%;
      border-radius: 2px;
    }

    .rgb-val {
      font-family: 'DM Mono', monospace;
      font-size: 0.68rem;
      width: 28px;
      text-align: right;
      opacity: 0.5;
    }

    .rgb-legend {
      font-family: 'DM Mono', monospace;
      font-size: 0.6rem;
      color: #2e2e32;
      letter-spacing: 0.1em;
      margin-bottom: 20px;
    }

    .divider {
      border: none;
      border-top: 1px solid var(--border);
      margin-bottom: 20px;
    }

    .reflection-label {
      font-family: 'DM Mono', monospace;
      font-size: 0.65rem;
      letter-spacing: 0.14em;
      text-transform: uppercase;
      color: var(--muted);
      margin-bottom: 12px;
    }

    .reflection-text {
      font-size: 1.1rem;
      font-weight: 300;
      line-height: 1.85;
      font-style: italic;
      color: var(--text);
    }

    .close-btn {
      display: block;
      margin: 20px auto 0;
      background: transparent;
      border: 1px solid var(--border);
      color: var(--muted);
      font-family: 'DM Mono', monospace;
      font-size: 0.68rem;
      letter-spacing: 0.1em;
      text-transform: uppercase;
      padding: 8px 20px;
      border-radius: 4px;
      cursor: pointer;
      transition: all 0.2s;
    }
    .close-btn:hover { border-color: var(--muted); color: var(--text); }

    @keyframes fadeDown {
      from { opacity: 0; transform: translateY(-16px); }
      to   { opacity: 1; transform: translateY(0); }
    }
    @keyframes fadeUp {
      from { opacity: 0; transform: translateY(14px); }
      to   { opacity: 1; transform: translateY(0); }
    }
  </style>
</head>
<body>
<div class="container">

  <header>
    <h1>Chroma Diary</h1>
    <p>your color history</p>
  </header>

  <a href="index.html" class="back">← back</a>

  <div class="detail" id="detail"></div>

  <div class="grid" id="grid"></div>

  <div class="empty" id="empty" style="display:none;">
    no entries yet — go write something.
  </div>

</div>

<script>
  const history = JSON.parse(localStorage.getItem('chroma_history') || '[]');
  const grid = document.getElementById('grid');
  const detail = document.getElementById('detail');
  const empty = document.getElementById('empty');

  let activeIndex = null;

  if (history.length === 0) {
    empty.style.display = 'block';
  } else {
    history.forEach((entry, i) => {
      const date = new Date(entry.timestamp);
      const label = date.toLocaleDateString('en-US', { month: 'short', day: 'numeric' });

      const swatch = document.createElement('div');
      swatch.className = 'swatch';
      swatch.style.background = `rgb(${entry.r},${entry.g},${entry.b})`;
      swatch.innerHTML = `<div class="swatch-date">${label}</div>`;
      swatch.onclick = () => toggleDetail(i, swatch, entry, date);
      grid.appendChild(swatch);
    });
  }

  function toggleDetail(i, swatch, entry, date) {
    const allSwatches = document.querySelectorAll('.swatch');

    if (activeIndex === i) {
      detail.classList.remove('visible');
      swatch.classList.remove('active');
      activeIndex = null;
      return;
    }

    allSwatches.forEach(s => s.classList.remove('active'));
    swatch.classList.add('active');
    activeIndex = i;

    const fullDate = date.toLocaleDateString('en-US', {
      weekday: 'long', year: 'numeric', month: 'long', day: 'numeric'
    });

    const fullTime = date.toLocaleTimeString('en-US', {
      hour: 'numeric', minute: '2-digit'
    });

    detail.innerHTML = `
      <div class="detail-header">
        <div class="detail-swatch" style="background:rgb(${entry.r},${entry.g},${entry.b})"></div>
        <div class="detail-meta">
          <div class="detail-date">${fullDate} · ${fullTime}</div>
          <div class="detail-rgb-label">rgb(${entry.r}, ${entry.g}, ${entry.b})</div>
        </div>
      </div>

      <div class="rgb-bars">
        <div class="rgb-bar-row">
          <span class="rgb-label">R</span>
          <div class="rgb-track"><div class="rgb-fill" style="width:${entry.r100}%; background:rgba(255,100,100,0.8)"></div></div>
          <span class="rgb-val">${entry.r100}</span>
        </div>
        <div class="rgb-bar-row">
          <span class="rgb-label">G</span>
          <div class="rgb-track"><div class="rgb-fill" style="width:${entry.g100}%; background:rgba(100,200,130,0.8)"></div></div>
          <span class="rgb-val">${entry.g100}</span>
        </div>
        <div class="rgb-bar-row">
          <span class="rgb-label">B</span>
          <div class="rgb-track"><div class="rgb-fill" style="width:${entry.b100}%; background:rgba(100,150,255,0.8)"></div></div>
          <span class="rgb-val">${entry.b100}</span>
        </div>
      </div>
      <div class="rgb-legend">R = rage · G = glad · B = bleak</div>

      <hr class="divider"/>

      <div class="reflection-label">reflection</div>
      <div class="reflection-text">${entry.reflection}</div>

      <button class="close-btn" onclick="closeDetail()">close</button>
    `;

    detail.classList.add('visible');
    detail.scrollIntoView({ behavior: 'smooth', block: 'nearest' });
  }

  function closeDetail() {
    detail.classList.remove('visible');
    document.querySelectorAll('.swatch').forEach(s => s.classList.remove('active'));
    activeIndex = null;
  }
</script>
</body>
</html>
