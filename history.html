<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8"/>
  <meta name="viewport" content="width=device-width, initial-scale=1.0"/>
  <title>Chroma Diary — History</title>
  <link href="https://fonts.googleapis.com/css2?family=Cormorant+Garamond:ital,wght@0,300;0,400;1,300;1,400&family=DM+Mono:wght@300;400&display=swap" rel="stylesheet"/>
  <style>
    *, *::before, *::after { box-sizing: border-box; margin: 0; padding: 0; }

    :root {
      --bg: #0e0e0f;
      --surface: #141415;
      --border: #2a2a2e;
      --text: #e8e4dc;
      --muted: #6b6868;
      --accent: #c9b99a;
    }

    body {
      background: var(--bg);
      color: var(--text);
      font-family: 'Cormorant Garamond', Georgia, serif;
      min-height: 100vh;
      padding: 60px 20px 80px;
      position: relative;
      overflow-x: hidden;
    }

    body::before {
      content: '';
      position: fixed;
      inset: 0;
      background-image: url("data:image/svg+xml,%3Csvg viewBox='0 0 256 256' xmlns='http://www.w3.org/2000/svg'%3E%3Cfilter id='noise'%3E%3CfeTurbulence type='fractalNoise' baseFrequency='0.9' numOctaves='4' stitchTiles='stitch'/%3E%3C/filter%3E%3Crect width='100%25' height='100%25' filter='url(%23noise)' opacity='0.04'/%3E%3C/svg%3E");
      pointer-events: none;
      z-index: 0;
      opacity: 0.4;
    }

    .container {
      width: 100%;
      max-width: 720px;
      margin: 0 auto;
      position: relative;
      z-index: 1;
    }

    header {
      text-align: center;
      margin-bottom: 56px;
      animation: fadeDown 0.9s ease both;
    }

    header h1 {
      font-size: 2.6rem;
      font-weight: 300;
      letter-spacing: 0.18em;
      text-transform: uppercase;
    }

    header p {
      font-style: italic;
      font-size: 1.05rem;
      color: var(--muted);
      margin-top: 8px;
    }

    .back {
      display: inline-block;
      margin-bottom: 40px;
      font-family: 'DM Mono', monospace;
      font-size: 0.68rem;
      letter-spacing: 0.12em;
      text-transform: uppercase;
      color: var(--muted);
      text-decoration: none;
      transition: color 0.2s;
    }
    .back:hover { color: var(--text); }

    .empty {
      text-align: center;
      font-style: italic;
      color: var(--muted);
      margin-top: 80px;
      font-size: 1.1rem;
    }

    .grid {
      display: grid;
      grid-template-columns: repeat(auto-fill, minmax(80px, 1fr));
      gap: 8px;
      margin-bottom: 60px;
    }

    .swatch {
      aspect-ratio: 1;
      border-radius: 4px;
      cursor: pointer;
      position: relative;
      transition: transform 0.2s, box-shadow 0.2s;
    }

    .swatch:hover { transform: scale(1.06); box-shadow: 0 4px 20px rgba(0,0,0,0.4); }
    .swatch.active { transform: scale(1.06); box-shadow: 0 0 0 2px var(--accent); }

    .swatch-canvas {
      display: block;
      width: 100%;
      height: 100%;
      border-radius: 4px;
    }

    .swatch-date {
      position: absolute;
      bottom: 4px;
      left: 0;
      right: 0;
      text-align: center;
      font-family: 'DM Mono', monospace;
      font-size: 0.62rem;
      color: rgba(255,255,255,0.7);
      letter-spacing: 0.03em;
      text-shadow: 0 1px 3px rgba(0,0,0,0.8);
    }

    .detail {
      display: none;
      background: var(--surface);
      border: 1px solid var(--border);
      border-radius: 6px;
      padding: 32px;
      margin-bottom: 40px;
    }
    .detail.visible { display: block; }

    .detail-header { display: flex; align-items: center; gap: 20px; margin-bottom: 24px; }
    .detail-swatch { width: 64px; height: 64px; border-radius: 4px; flex-shrink: 0; }
    .detail-meta { flex: 1; }

    .detail-date {
      font-family: 'DM Mono', monospace;
      font-size: 0.72rem;
      letter-spacing: 0.1em;
      color: var(--muted);
      text-transform: uppercase;
      margin-bottom: 6px;
    }

    .detail-rgb-label {
      font-family: 'DM Mono', monospace;
      font-size: 0.65rem;
      color: #3a3a3e;
      letter-spacing: 0.08em;
    }

    .rgb-bars { display: flex; flex-direction: column; gap: 8px; margin-bottom: 10px; }
    .rgb-bar-row { display: flex; align-items: center; gap: 10px; }

    .rgb-label {
      font-family: 'DM Mono', monospace;
      font-size: 0.7rem;
      width: 14px;
      opacity: 0.6;
    }

    .rgb-track {
      flex: 1;
      height: 4px;
      background: rgba(255,255,255,0.06);
      border-radius: 2px;
      overflow: hidden;
    }

    .rgb-fill { height: 100%; border-radius: 2px; }

    .rgb-val {
      font-family: 'DM Mono', monospace;
      font-size: 0.68rem;
      width: 28px;
      text-align: right;
      opacity: 0.5;
    }

    .rgb-legend {
      font-family: 'DM Mono', monospace;
      font-size: 0.6rem;
      color: #2e2e32;
      letter-spacing: 0.1em;
      margin-bottom: 20px;
    }

    .divider { border: none; border-top: 1px solid var(--border); margin-bottom: 20px; }

    .reflection-label {
      font-family: 'DM Mono', monospace;
      font-size: 0.65rem;
      letter-spacing: 0.14em;
      text-transform: uppercase;
      color: var(--muted);
      margin-bottom: 12px;
    }

    .reflection-text {
      font-size: 1.1rem;
      font-weight: 300;
      line-height: 1.85;
      font-style: italic;
      color: var(--text);
    }

    .close-btn {
      display: block;
      margin: 20px auto 0;
      background: transparent;
      border: 1px solid var(--border);
      color: var(--muted);
      font-family: 'DM Mono', monospace;
      font-size: 0.68rem;
      letter-spacing: 0.1em;
      text-transform: uppercase;
      padding: 8px 20px;
      border-radius: 4px;
      cursor: pointer;
      transition: all 0.2s;
    }
    .close-btn:hover { border-color: var(--muted); color: var(--text); }

    /* ── Coloring Book ── */
    .coloring-section {
      margin-top: 60px;
      border-top: 1px solid var(--border);
      padding-top: 48px;
    }

    .pattern-label {
      font-family: 'DM Mono', monospace;
      font-size: 0.65rem;
      letter-spacing: 0.16em;
      text-transform: uppercase;
      color: var(--muted);
      text-align: center;
      margin-bottom: 8px;
    }

    .cb-desc {
      text-align: center;
      font-style: italic;
      color: var(--muted);
      font-size: 0.95rem;
      margin-bottom: 28px;
    }

    .cb-page-tabs {
      display: flex;
      gap: 8px;
      flex-wrap: wrap;
      justify-content: center;
      margin-bottom: 24px;
    }

    .cb-tab {
      background: transparent;
      border: 1px solid var(--border);
      color: var(--muted);
      font-family: 'DM Mono', monospace;
      font-size: 0.65rem;
      letter-spacing: 0.08em;
      text-transform: uppercase;
      padding: 6px 14px;
      border-radius: 3px;
      cursor: pointer;
      transition: all 0.2s;
    }
    .cb-tab:hover { border-color: var(--accent); color: var(--accent); }
    .cb-tab.active { border-color: var(--accent); color: var(--accent); background: rgba(201,185,154,0.08); }

    .cb-palette-wrap {
      margin-bottom: 16px;
    }

    .cb-palette-label {
      font-family: 'DM Mono', monospace;
      font-size: 0.6rem;
      letter-spacing: 0.1em;
      text-transform: uppercase;
      color: #2e2e32;
      margin-bottom: 10px;
      text-align: center;
    }

    .cb-palette {
      display: flex;
      flex-wrap: wrap;
      gap: 8px;
      justify-content: center;
      margin-bottom: 10px;
    }

    .cb-swatch {
      width: 36px;
      height: 36px;
      border-radius: 50%;
      cursor: pointer;
      border: 2px solid transparent;
      transition: all 0.2s;
      position: relative;
    }

    .cb-swatch:hover { transform: scale(1.15); }
    .cb-swatch.selected { border-color: var(--text); transform: scale(1.15); }
    .cb-swatch.used { opacity: 0.2; cursor: not-allowed; pointer-events: none; }
    .cb-swatch.used::after {
      content: '✕';
      position: absolute;
      inset: 0;
      display: flex;
      align-items: center;
      justify-content: center;
      font-size: 0.7rem;
      color: white;
    }

    .cb-brush-status {
      text-align: center;
      font-family: 'DM Mono', monospace;
      font-size: 0.68rem;
      color: var(--muted);
      letter-spacing: 0.08em;
      min-height: 20px;
    }

    .cb-canvas-wrap {
      position: relative;
      max-width: 560px;
      margin: 16px auto;
      border-radius: 6px;
      overflow: hidden;
      background: #fff;
      cursor: crosshair;
    }

    #cbCanvas {
      display: block;
      width: 100%;
      height: auto;
      touch-action: none;
    }

    .cb-controls {
      display: flex;
      gap: 10px;
      justify-content: center;
      margin-top: 16px;
      flex-wrap: wrap;
    }

    .cb-ctrl-btn {
      background: transparent;
      border: 1px solid var(--border);
      color: var(--muted);
      font-family: 'DM Mono', monospace;
      font-size: 0.68rem;
      letter-spacing: 0.1em;
      text-transform: uppercase;
      padding: 8px 18px;
      border-radius: 4px;
      cursor: pointer;
      transition: all 0.2s;
    }
    .cb-ctrl-btn:hover { border-color: var(--muted); color: var(--text); }

    @keyframes fadeDown {
      from { opacity: 0; transform: translateY(-16px); }
      to   { opacity: 1; transform: translateY(0); }
    }
    @keyframes fadeUp {
      from { opacity: 0; transform: translateY(14px); }
      to   { opacity: 1; transform: translateY(0); }
    }
  </style>
</head>
<body>
<div class="container">

  <header>
    <h1>Chroma Diary</h1>
    <p>your color history</p>
  </header>

  <a href="index.html" class="back">← back</a>

  <div class="detail" id="detail"></div>
  <div class="grid" id="grid"></div>
  <div class="empty" id="empty" style="display:none;">no entries yet — go write something.</div>

  <!-- Coloring Book Section -->
  <div class="coloring-section" id="coloringSection" style="display:none;">
    <div class="pattern-label">coloring book</div>
    <p class="cb-desc">each color from your history can only be used once per page.</p>

    <div class="cb-page-tabs" id="cbPageTabs"></div>

    <div class="cb-palette-wrap">
      <div class="cb-palette-label">your colors — click to select brush</div>
      <div class="cb-palette" id="cbPalette"></div>
      <div class="cb-brush-status" id="cbBrushStatus">no color selected</div>
    </div>

    <div class="cb-canvas-wrap" id="cbCanvasWrap">
      <canvas id="cbCanvas" width="560" height="560"></canvas>
    </div>

    <div class="cb-controls">
      <button class="cb-ctrl-btn" onclick="cbReset()">reset page</button>
      <button class="cb-ctrl-btn" onclick="cbRandomPage()">random page</button>
      <button class="cb-ctrl-btn" onclick="cbDownload()">save image</button>
    </div>
  </div>

</div>

<script>
  const history = JSON.parse(localStorage.getItem('chroma_history') || '[]');
  const grid = document.getElementById('grid');
  const detail = document.getElementById('detail');
  const coloringSection = document.getElementById('coloringSection');
  let activeIndex = null;

  if (history.length === 0) {
    document.getElementById('empty').style.display = 'block';
  } else {
    coloringSection.style.display = 'block';
    history.forEach((entry, i) => {
      const date = new Date(entry.timestamp);
      const label = (date.getMonth()+1) + '/' + date.getDate();
      const swatch = document.createElement('div');
      swatch.className = 'swatch';
      swatch.innerHTML = `<canvas class="swatch-canvas" width="80" height="80"></canvas><div class="swatch-date">${label}</div>`;
      swatch.onclick = () => toggleDetail(i, swatch, entry, date);
      grid.appendChild(swatch);
      // draw vignette after appending
      requestAnimationFrame(() => {
        const canvas = swatch.querySelector('.swatch-canvas');
        if (!canvas) return;
        const ctx = canvas.getContext('2d');
        const W = canvas.width, H = canvas.height;
        const s = entry.s || 128;
        ctx.fillStyle = `rgb(${entry.r},${entry.g},${entry.b})`;
        ctx.fillRect(0, 0, W, H);
        const vigIntensity = 1 - (s / 255);
        const brightIntensity = s / 255;
        if (vigIntensity > 0.05) {
          const grad = ctx.createRadialGradient(W/2,H/2,H*0.1,W/2,H/2,Math.sqrt(W*W+H*H)/2);
          grad.addColorStop(0, 'rgba(0,0,0,0)');
          grad.addColorStop(1, `rgba(0,0,0,${(vigIntensity*0.75).toFixed(2)})`);
          ctx.fillStyle = grad; ctx.fillRect(0,0,W,H);
        }
        if (brightIntensity > 0.05) {
          const grad2 = ctx.createRadialGradient(W/2,H/2,H*0.15,W/2,H/2,Math.sqrt(W*W+H*H)/2);
          grad2.addColorStop(0, 'rgba(255,255,255,0)');
          grad2.addColorStop(1, `rgba(255,255,255,${(brightIntensity*0.45).toFixed(2)})`);
          ctx.fillStyle = grad2; ctx.fillRect(0,0,W,H);
        }
      });
    });
  }

  function toggleDetail(i, swatch, entry, date) {
    if (activeIndex === i) {
      detail.classList.remove('visible');
      swatch.classList.remove('active');
      activeIndex = null;
      return;
    }
    document.querySelectorAll('.swatch').forEach(s => s.classList.remove('active'));
    swatch.classList.add('active');
    activeIndex = i;

    const fullDate = date.toLocaleDateString('en-US', { weekday: 'long', year: 'numeric', month: 'long', day: 'numeric' });
    const fullTime = date.toLocaleTimeString('en-US', { hour: 'numeric', minute: '2-digit' });

    detail.innerHTML = `
      <div class="detail-header">
        <div class="detail-swatch" style="background:rgb(${entry.r},${entry.g},${entry.b})"></div>
        <div class="detail-meta">
          <div class="detail-date">${fullDate} · ${fullTime}</div>
          <div class="detail-rgb-label">rgb(${entry.r}, ${entry.g}, ${entry.b})</div>
        </div>
      </div>
      <div class="rgb-bars">
        <div class="rgb-bar-row">
          <span class="rgb-label">R</span>
          <div class="rgb-track"><div class="rgb-fill" style="width:${entry.r100}%; background:rgba(255,100,100,0.8)"></div></div>
          <span class="rgb-val">${entry.r100}</span>
        </div>
        <div class="rgb-bar-row">
          <span class="rgb-label">G</span>
          <div class="rgb-track"><div class="rgb-fill" style="width:${entry.g100}%; background:rgba(100,200,130,0.8)"></div></div>
          <span class="rgb-val">${entry.g100}</span>
        </div>
        <div class="rgb-bar-row">
          <span class="rgb-label">B</span>
          <div class="rgb-track"><div class="rgb-fill" style="width:${entry.b100}%; background:rgba(100,150,255,0.8)"></div></div>
          <span class="rgb-val">${entry.b100}</span>
        </div>
        <div class="rgb-bar-row">
          <span class="rgb-label">S</span>
          <div class="rgb-track"><div class="rgb-fill" style="width:${entry.s100 || 50}%; background:linear-gradient(to right, #333, #fff)"></div></div>
          <span class="rgb-val">${entry.s100 || 50}</span>
        </div>
      </div>
      <div class="rgb-legend">R = Rage · G = Glee · B = Bleakness · S = Serenity</div>
      <hr class="divider"/>
      <div class="reflection-label">reflection</div>
      <div class="reflection-text">${entry.reflection}</div>
      <button class="close-btn" onclick="closeDetail()">close</button>
    `;

    detail.classList.add('visible');
    detail.scrollIntoView({ behavior: 'smooth', block: 'nearest' });
  }

  function closeDetail() {
    detail.classList.remove('visible');
    document.querySelectorAll('.swatch').forEach(s => s.classList.remove('active'));
    activeIndex = null;
  }

  // ── Coloring Book ──────────────────────────────────────────────────

  const CB_PAGES = [
    { name: 'flower', draw: drawFlower },
    { name: 'garden', draw: drawGarden },
    { name: 'forest', draw: drawForest },
    { name: 'river', draw: drawRiver },
    { name: 'sun & hills', draw: drawSunHills },
  ];

  let cbCurrentPage = 0;
  let cbSelectedColor = null;
  let cbUsedColors = new Set();
  let cbRegions = []; // { path: Path2D, filled: bool, color: null }

  function cbInit() {
    // build page tabs
    const tabsEl = document.getElementById('cbPageTabs');
    tabsEl.innerHTML = '';
    CB_PAGES.forEach((p, i) => {
      const btn = document.createElement('button');
      btn.className = 'cb-tab' + (i === cbCurrentPage ? ' active' : '');
      btn.textContent = p.name;
      btn.onclick = () => { cbCurrentPage = i; cbReset(); cbUpdateTabs(); };
      tabsEl.appendChild(btn);
    });

    cbBuildPalette();
    cbDrawPage();
  }

  function cbUpdateTabs() {
    document.querySelectorAll('.cb-tab').forEach((t, i) => {
      t.classList.toggle('active', i === cbCurrentPage);
    });
  }

  function cbBuildPalette() {
    const pal = document.getElementById('cbPalette');
    pal.innerHTML = '';
    cbSelectedColor = null;
    document.getElementById('cbBrushStatus').textContent = 'no color selected';

    history.forEach((entry, i) => {
      const sw = document.createElement('div');
      sw.className = 'cb-swatch' + (cbUsedColors.has(i) ? ' used' : '');
      sw.style.background = `rgb(${entry.r},${entry.g},${entry.b})`;
      sw.title = `rgb(${entry.r},${entry.g},${entry.b})`;
      sw.dataset.index = i;
      sw.onclick = () => {
        if (cbUsedColors.has(i)) return;
        document.querySelectorAll('.cb-swatch').forEach(s => s.classList.remove('selected'));
        sw.classList.add('selected');
        cbSelectedColor = { index: i, r: entry.r, g: entry.g, b: entry.b };
        document.getElementById('cbBrushStatus').textContent = `brush: rgb(${entry.r}, ${entry.g}, ${entry.b})`;
        document.getElementById('cbCanvas').style.cursor = 'crosshair';
      };
      pal.appendChild(sw);
    });
  }

  function cbReset() {
    cbUsedColors = new Set();
    cbRegions = [];
    cbSelectedColor = null;
    cbBuildPalette();
    cbDrawPage();
    document.getElementById('cbBrushStatus').textContent = 'no color selected';
  }

  function cbRandomPage() {
    cbCurrentPage = Math.floor(Math.random() * CB_PAGES.length);
    cbReset();
    cbUpdateTabs();
  }

  function cbDrawPage() {
    const canvas = document.getElementById('cbCanvas');
    const ctx = canvas.getContext('2d');
    ctx.clearRect(0, 0, canvas.width, canvas.height);

    // white background
    ctx.fillStyle = '#ffffff';
    ctx.fillRect(0, 0, canvas.width, canvas.height);

    // draw filled regions first
    cbRegions.forEach(region => {
      if (region.filled && region.color) {
        ctx.fillStyle = `rgba(${region.color.r},${region.color.g},${region.color.b},0.85)`;
        ctx.fill(region.path);
      }
    });

    // draw outlines on top
    CB_PAGES[cbCurrentPage].draw(ctx, canvas.width, canvas.height);
  }

  // click to fill region
  document.getElementById('cbCanvas').addEventListener('click', function(e) {
    if (!cbSelectedColor) return;

    const canvas = document.getElementById('cbCanvas');
    const ctx = canvas.getContext('2d');
    const rect = canvas.getBoundingClientRect();
    const scaleX = canvas.width / rect.width;
    const scaleY = canvas.height / rect.height;
    const x = (e.clientX - rect.left) * scaleX;
    const y = (e.clientY - rect.top) * scaleY;

    // find which region was clicked
    let hit = false;
    for (let i = 0; i < cbRegions.length; i++) {
      const region = cbRegions[i];
      if (ctx.isPointInPath(region.path, x, y)) {
        if (region.filled) return; // already filled
        region.filled = true;
        region.color = { ...cbSelectedColor };

        // mark color as used
        const colorIdx = cbSelectedColor.index;
        cbUsedColors.add(colorIdx);

        // update palette
        const sw = document.querySelector(`.cb-swatch[data-index="${colorIdx}"]`);
        if (sw) sw.classList.add('used');

        // clear selection
        cbSelectedColor = null;
        document.querySelectorAll('.cb-swatch').forEach(s => s.classList.remove('selected'));
        document.getElementById('cbBrushStatus').textContent = 'color applied — select another';
        canvas.style.cursor = 'default';

        cbDrawPage();
        hit = true;
        break;
      }
    }
  });

  function cbDownload() {
    const canvas = document.getElementById('cbCanvas');
    const a = document.createElement('a');
    a.download = 'chroma-coloring.png';
    a.href = canvas.toDataURL('image/png');
    a.click();
  }

  // ── Drawing Functions ──────────────────────────────────────────────

  function addRegion(path) { cbRegions.push({ path, filled: false, color: null }); }

  function outlineStyle(ctx) {
    ctx.strokeStyle = '#1a1a1a';
    ctx.lineWidth = 2.5;
    ctx.lineJoin = 'round';
    ctx.lineCap = 'round';
  }

  // PAGE 1: Flower
  function drawFlower(ctx, W, H) {
    cbRegions = [];
    const cx = W / 2, cy = H / 2;

    // petals
    const numPetals = 8;
    for (let i = 0; i < numPetals; i++) {
      const angle = (i / numPetals) * Math.PI * 2;
      const px = cx + Math.cos(angle) * 100;
      const py = cy + Math.sin(angle) * 100;
      const p = new Path2D();
      p.ellipse(px, py, 38, 60, angle, 0, Math.PI * 2);
      addRegion(p);
    }

    // center circle
    const center = new Path2D();
    center.arc(cx, cy, 48, 0, Math.PI * 2);
    addRegion(center);

    // leaves
    const leaf1 = new Path2D();
    leaf1.moveTo(cx - 60, cy + 130);
    leaf1.bezierCurveTo(cx - 120, cy + 80, cx - 20, cy + 160, cx, cy + 200);
    leaf1.bezierCurveTo(cx + 20, cy + 160, cx - 20, cy + 90, cx - 60, cy + 130);
    addRegion(leaf1);

    const leaf2 = new Path2D();
    leaf2.moveTo(cx + 60, cy + 130);
    leaf2.bezierCurveTo(cx + 120, cy + 80, cx + 20, cy + 160, cx, cy + 200);
    leaf2.bezierCurveTo(cx - 20, cy + 160, cx + 20, cy + 90, cx + 60, cy + 130);
    addRegion(leaf2);

    // stem
    const stem = new Path2D();
    stem.rect(cx - 8, cy + 48, 16, 160);
    addRegion(stem);

    // sky background
    const sky = new Path2D();
    sky.rect(0, 0, W, H);
    addRegion(sky);

    // draw outlines
    outlineStyle(ctx);

    // sky
    ctx.beginPath();
    ctx.rect(0, 0, W, H);
    ctx.stroke();

    // stem
    ctx.beginPath();
    ctx.rect(cx - 8, cy + 48, 16, 160);
    ctx.stroke();

    // leaves
    ctx.beginPath();
    ctx.moveTo(cx - 60, cy + 130);
    ctx.bezierCurveTo(cx - 120, cy + 80, cx - 20, cy + 160, cx, cy + 200);
    ctx.bezierCurveTo(cx + 20, cy + 160, cx - 20, cy + 90, cx - 60, cy + 130);
    ctx.stroke();

    ctx.beginPath();
    ctx.moveTo(cx + 60, cy + 130);
    ctx.bezierCurveTo(cx + 120, cy + 80, cx + 20, cy + 160, cx, cy + 200);
    ctx.bezierCurveTo(cx - 20, cy + 160, cx + 20, cy + 90, cx + 60, cy + 130);
    ctx.stroke();

    // petals
    for (let i = 0; i < numPetals; i++) {
      const angle = (i / numPetals) * Math.PI * 2;
      const px = cx + Math.cos(angle) * 100;
      const py = cy + Math.sin(angle) * 100;
      ctx.beginPath();
      ctx.ellipse(px, py, 38, 60, angle, 0, Math.PI * 2);
      ctx.stroke();
    }

    // center
    ctx.beginPath();
    ctx.arc(cx, cy, 48, 0, Math.PI * 2);
    ctx.stroke();
  }

  // PAGE 2: Garden
  function drawGarden(ctx, W, H) {
    cbRegions = [];

    // sky
    const sky = new Path2D();
    sky.rect(0, 0, W, H * 0.55);
    addRegion(sky);

    // ground
    const ground = new Path2D();
    ground.rect(0, H * 0.55, W, H * 0.45);
    addRegion(ground);

    // sun
    const sun = new Path2D();
    sun.arc(80, 80, 50, 0, Math.PI * 2);
    addRegion(sun);

    // cloud 1
    const cloud1 = new Path2D();
    cloud1.arc(300, 90, 35, 0, Math.PI * 2);
    cloud1.arc(340, 75, 40, 0, Math.PI * 2);
    cloud1.arc(380, 90, 30, 0, Math.PI * 2);
    addRegion(cloud1);

    // cloud 2
    const cloud2 = new Path2D();
    cloud2.arc(160, 120, 28, 0, Math.PI * 2);
    cloud2.arc(195, 108, 33, 0, Math.PI * 2);
    cloud2.arc(225, 120, 25, 0, Math.PI * 2);
    addRegion(cloud2);

    // flower 1 - left
    const f1stem = new Path2D(); f1stem.rect(120, 290, 10, 80); addRegion(f1stem);
    const f1head = new Path2D(); f1head.arc(125, 275, 30, 0, Math.PI * 2); addRegion(f1head);

    // flower 2 - center
    const f2stem = new Path2D(); f2stem.rect(270, 270, 10, 100); addRegion(f2stem);
    const f2head = new Path2D(); f2head.arc(275, 255, 35, 0, Math.PI * 2); addRegion(f2head);

    // flower 3 - right
    const f3stem = new Path2D(); f3stem.rect(420, 285, 10, 85); addRegion(f3stem);
    const f3head = new Path2D(); f3head.arc(425, 270, 28, 0, Math.PI * 2); addRegion(f3head);

    // bush left
    const bush1 = new Path2D();
    bush1.arc(80, 320, 45, 0, Math.PI * 2);
    bush1.arc(120, 305, 40, 0, Math.PI * 2);
    bush1.arc(55, 308, 35, 0, Math.PI * 2);
    addRegion(bush1);

    // bush right
    const bush2 = new Path2D();
    bush2.arc(480, 320, 45, 0, Math.PI * 2);
    bush2.arc(440, 308, 38, 0, Math.PI * 2);
    bush2.arc(505, 310, 32, 0, Math.PI * 2);
    addRegion(bush2);

    // path
    const path = new Path2D();
    path.moveTo(220, 560);
    path.bezierCurveTo(230, 480, 280, 420, 310, 310);
    path.lineTo(340, 310);
    path.bezierCurveTo(370, 420, 340, 480, 350, 560);
    path.closePath();
    addRegion(path);

    outlineStyle(ctx);

    // sky bg
    ctx.beginPath(); ctx.rect(0, 0, W, H * 0.55); ctx.stroke();
    // ground
    ctx.beginPath(); ctx.rect(0, H * 0.55, W, H * 0.45); ctx.stroke();
    // sun
    ctx.beginPath(); ctx.arc(80, 80, 50, 0, Math.PI * 2); ctx.stroke();
    // sun rays
    ctx.lineWidth = 1.5;
    for (let i = 0; i < 8; i++) {
      const a = (i / 8) * Math.PI * 2;
      ctx.beginPath();
      ctx.moveTo(80 + Math.cos(a) * 55, 80 + Math.sin(a) * 55);
      ctx.lineTo(80 + Math.cos(a) * 72, 80 + Math.sin(a) * 72);
      ctx.stroke();
    }
    ctx.lineWidth = 2.5;
    // clouds
    ctx.beginPath(); ctx.arc(300, 90, 35, 0, Math.PI * 2); ctx.arc(340, 75, 40, 0, Math.PI * 2); ctx.arc(380, 90, 30, 0, Math.PI * 2); ctx.stroke();
    ctx.beginPath(); ctx.arc(160, 120, 28, 0, Math.PI * 2); ctx.arc(195, 108, 33, 0, Math.PI * 2); ctx.arc(225, 120, 25, 0, Math.PI * 2); ctx.stroke();
    // stems
    ctx.beginPath(); ctx.rect(120, 290, 10, 80); ctx.stroke();
    ctx.beginPath(); ctx.rect(270, 270, 10, 100); ctx.stroke();
    ctx.beginPath(); ctx.rect(420, 285, 10, 85); ctx.stroke();
    // flower heads
    ctx.beginPath(); ctx.arc(125, 275, 30, 0, Math.PI * 2); ctx.stroke();
    ctx.beginPath(); ctx.arc(275, 255, 35, 0, Math.PI * 2); ctx.stroke();
    ctx.beginPath(); ctx.arc(425, 270, 28, 0, Math.PI * 2); ctx.stroke();
    // bushes
    ctx.beginPath(); ctx.arc(80, 320, 45, 0, Math.PI * 2); ctx.arc(120, 305, 40, 0, Math.PI * 2); ctx.arc(55, 308, 35, 0, Math.PI * 2); ctx.stroke();
    ctx.beginPath(); ctx.arc(480, 320, 45, 0, Math.PI * 2); ctx.arc(440, 308, 38, 0, Math.PI * 2); ctx.arc(505, 310, 32, 0, Math.PI * 2); ctx.stroke();
    // path
    ctx.beginPath();
    ctx.moveTo(220, 560); ctx.bezierCurveTo(230, 480, 280, 420, 310, 310);
    ctx.lineTo(340, 310); ctx.bezierCurveTo(370, 420, 340, 480, 350, 560);
    ctx.closePath(); ctx.stroke();
  }

  // PAGE 3: Forest
  function drawForest(ctx, W, H) {
    cbRegions = [];

    // sky
    const sky = new Path2D(); sky.rect(0, 0, W, H * 0.5); addRegion(sky);
    // ground
    const ground = new Path2D(); ground.rect(0, H * 0.5, W, H * 0.5); addRegion(ground);
    // moon
    const moon = new Path2D(); moon.arc(W - 90, 70, 40, 0, Math.PI * 2); addRegion(moon);

    // trees - function to make a tree path
    function makeTree(tx, ty, w, h) {
      const trunk = new Path2D(); trunk.rect(tx - w * 0.08, ty, w * 0.16, h * 0.3); addRegion(trunk);
      const canopy1 = new Path2D();
      canopy1.moveTo(tx, ty - h * 0.5);
      canopy1.lineTo(tx - w * 0.5, ty + h * 0.15);
      canopy1.lineTo(tx + w * 0.5, ty + h * 0.15);
      canopy1.closePath();
      addRegion(canopy1);
      const canopy2 = new Path2D();
      canopy2.moveTo(tx, ty - h * 0.72);
      canopy2.lineTo(tx - w * 0.38, ty - h * 0.1);
      canopy2.lineTo(tx + w * 0.38, ty - h * 0.1);
      canopy2.closePath();
      addRegion(canopy2);
      const canopy3 = new Path2D();
      canopy3.moveTo(tx, ty - h * 0.92);
      canopy3.lineTo(tx - w * 0.24, ty - h * 0.38);
      canopy3.lineTo(tx + w * 0.24, ty - h * 0.38);
      canopy3.closePath();
      addRegion(canopy3);
    }

    makeTree(100, H * 0.5, 160, 280);
    makeTree(280, H * 0.5, 130, 240);
    makeTree(440, H * 0.5, 170, 290);
    makeTree(190, H * 0.5, 110, 200);
    makeTree(370, H * 0.5, 120, 210);

    outlineStyle(ctx);
    ctx.beginPath(); ctx.rect(0, 0, W, H * 0.5); ctx.stroke();
    ctx.beginPath(); ctx.rect(0, H * 0.5, W, H * 0.5); ctx.stroke();
    ctx.beginPath(); ctx.arc(W - 90, 70, 40, 0, Math.PI * 2); ctx.stroke();

    function drawTreeOutline(tx, ty, w, h) {
      ctx.beginPath(); ctx.rect(tx - w * 0.08, ty, w * 0.16, h * 0.3); ctx.stroke();
      ctx.beginPath();
      ctx.moveTo(tx, ty - h * 0.5); ctx.lineTo(tx - w * 0.5, ty + h * 0.15); ctx.lineTo(tx + w * 0.5, ty + h * 0.15); ctx.closePath(); ctx.stroke();
      ctx.beginPath();
      ctx.moveTo(tx, ty - h * 0.72); ctx.lineTo(tx - w * 0.38, ty - h * 0.1); ctx.lineTo(tx + w * 0.38, ty - h * 0.1); ctx.closePath(); ctx.stroke();
      ctx.beginPath();
      ctx.moveTo(tx, ty - h * 0.92); ctx.lineTo(tx - w * 0.24, ty - h * 0.38); ctx.lineTo(tx + w * 0.24, ty - h * 0.38); ctx.closePath(); ctx.stroke();
    }

    drawTreeOutline(100, H * 0.5, 160, 280);
    drawTreeOutline(280, H * 0.5, 130, 240);
    drawTreeOutline(440, H * 0.5, 170, 290);
    drawTreeOutline(190, H * 0.5, 110, 200);
    drawTreeOutline(370, H * 0.5, 120, 210);
  }

  // PAGE 4: River
  function drawRiver(ctx, W, H) {
    cbRegions = [];

    // sky
    const sky = new Path2D(); sky.rect(0, 0, W, H * 0.4); addRegion(sky);
    // left bank
    const leftBank = new Path2D();
    leftBank.moveTo(0, H * 0.4); leftBank.lineTo(W * 0.3, H * 0.4);
    leftBank.bezierCurveTo(W * 0.25, H * 0.6, W * 0.2, H * 0.8, W * 0.15, H);
    leftBank.lineTo(0, H); leftBank.closePath(); addRegion(leftBank);
    // right bank
    const rightBank = new Path2D();
    rightBank.moveTo(W, H * 0.4); rightBank.lineTo(W * 0.7, H * 0.4);
    rightBank.bezierCurveTo(W * 0.75, H * 0.6, W * 0.8, H * 0.8, W * 0.85, H);
    rightBank.lineTo(W, H); rightBank.closePath(); addRegion(rightBank);
    // river
    const river = new Path2D();
    river.moveTo(W * 0.3, H * 0.4);
    river.bezierCurveTo(W * 0.35, H * 0.6, W * 0.3, H * 0.8, W * 0.15, H);
    river.lineTo(W * 0.85, H);
    river.bezierCurveTo(W * 0.8, H * 0.8, W * 0.75, H * 0.6, W * 0.7, H * 0.4);
    river.closePath(); addRegion(river);
    // sun
    const sun = new Path2D(); sun.arc(W * 0.5, 70, 45, 0, Math.PI * 2); addRegion(sun);
    // left hill
    const hill1 = new Path2D();
    hill1.moveTo(0, H * 0.4); hill1.bezierCurveTo(W * 0.1, H * 0.2, W * 0.2, H * 0.25, W * 0.3, H * 0.4); hill1.closePath(); addRegion(hill1);
    // right hill
    const hill2 = new Path2D();
    hill2.moveTo(W, H * 0.4); hill2.bezierCurveTo(W * 0.9, H * 0.2, W * 0.8, H * 0.25, W * 0.7, H * 0.4); hill2.closePath(); addRegion(hill2);

    outlineStyle(ctx);
    ctx.beginPath(); ctx.rect(0, 0, W, H * 0.4); ctx.stroke();
    ctx.beginPath(); ctx.arc(W * 0.5, 70, 45, 0, Math.PI * 2); ctx.stroke();
    // hills
    ctx.beginPath(); ctx.moveTo(0, H * 0.4); ctx.bezierCurveTo(W * 0.1, H * 0.2, W * 0.2, H * 0.25, W * 0.3, H * 0.4); ctx.closePath(); ctx.stroke();
    ctx.beginPath(); ctx.moveTo(W, H * 0.4); ctx.bezierCurveTo(W * 0.9, H * 0.2, W * 0.8, H * 0.25, W * 0.7, H * 0.4); ctx.closePath(); ctx.stroke();
    // banks
    ctx.beginPath();
    ctx.moveTo(0, H * 0.4); ctx.lineTo(W * 0.3, H * 0.4);
    ctx.bezierCurveTo(W * 0.25, H * 0.6, W * 0.2, H * 0.8, W * 0.15, H);
    ctx.lineTo(0, H); ctx.closePath(); ctx.stroke();
    ctx.beginPath();
    ctx.moveTo(W, H * 0.4); ctx.lineTo(W * 0.7, H * 0.4);
    ctx.bezierCurveTo(W * 0.75, H * 0.6, W * 0.8, H * 0.8, W * 0.85, H);
    ctx.lineTo(W, H); ctx.closePath(); ctx.stroke();
    // river
    ctx.beginPath();
    ctx.moveTo(W * 0.3, H * 0.4);
    ctx.bezierCurveTo(W * 0.35, H * 0.6, W * 0.3, H * 0.8, W * 0.15, H);
    ctx.lineTo(W * 0.85, H);
    ctx.bezierCurveTo(W * 0.8, H * 0.8, W * 0.75, H * 0.6, W * 0.7, H * 0.4);
    ctx.closePath(); ctx.stroke();
    // river ripples
    ctx.lineWidth = 1.2;
    ctx.beginPath(); ctx.moveTo(W*0.35, H*0.55); ctx.bezierCurveTo(W*0.42, H*0.52, W*0.5, H*0.58, W*0.58, H*0.55); ctx.stroke();
    ctx.beginPath(); ctx.moveTo(W*0.3, H*0.7); ctx.bezierCurveTo(W*0.4, H*0.67, W*0.52, H*0.73, W*0.62, H*0.7); ctx.stroke();
  }

  // PAGE 5: Sun & Hills
  function drawSunHills(ctx, W, H) {
    cbRegions = [];

    // sky
    const sky = new Path2D(); sky.rect(0, 0, W, H * 0.65); addRegion(sky);
    // far hill
    const hill1 = new Path2D();
    hill1.moveTo(0, H * 0.65); hill1.bezierCurveTo(W * 0.15, H * 0.35, W * 0.4, H * 0.3, W * 0.6, H * 0.5);
    hill1.bezierCurveTo(W * 0.75, H * 0.62, W * 0.9, H * 0.65, W, H * 0.6);
    hill1.lineTo(W, H); hill1.lineTo(0, H); hill1.closePath(); addRegion(hill1);
    // near hill left
    const hill2 = new Path2D();
    hill2.moveTo(0, H); hill2.lineTo(0, H * 0.75);
    hill2.bezierCurveTo(W * 0.1, H * 0.55, W * 0.3, H * 0.52, W * 0.45, H * 0.68);
    hill2.bezierCurveTo(W * 0.5, H * 0.75, W * 0.55, H * 0.78, W * 0.6, H);
    hill2.closePath(); addRegion(hill2);
    // near hill right
    const hill3 = new Path2D();
    hill3.moveTo(W, H); hill3.lineTo(W, H * 0.72);
    hill3.bezierCurveTo(W * 0.9, H * 0.52, W * 0.72, H * 0.5, W * 0.6, H * 0.65);
    hill3.bezierCurveTo(W * 0.58, H * 0.75, W * 0.59, H * 0.85, W * 0.6, H);
    hill3.closePath(); addRegion(hill3);
    // sun
    const sun = new Path2D(); sun.arc(W * 0.5, H * 0.25, 65, 0, Math.PI * 2); addRegion(sun);
    // cloud left
    const cl = new Path2D();
    cl.arc(130, 120, 30, 0, Math.PI * 2); cl.arc(165, 105, 36, 0, Math.PI * 2); cl.arc(198, 120, 26, 0, Math.PI * 2); addRegion(cl);
    // cloud right
    const cr = new Path2D();
    cr.arc(380, 150, 26, 0, Math.PI * 2); cr.arc(412, 136, 32, 0, Math.PI * 2); cr.arc(442, 150, 22, 0, Math.PI * 2); addRegion(cr);

    outlineStyle(ctx);
    ctx.beginPath(); ctx.rect(0, 0, W, H * 0.65); ctx.stroke();
    ctx.beginPath(); ctx.arc(W * 0.5, H * 0.25, 65, 0, Math.PI * 2); ctx.stroke();
    // sun rays
    ctx.lineWidth = 1.5;
    for (let i = 0; i < 12; i++) {
      const a = (i / 12) * Math.PI * 2;
      ctx.beginPath();
      ctx.moveTo(W*0.5 + Math.cos(a)*70, H*0.25 + Math.sin(a)*70);
      ctx.lineTo(W*0.5 + Math.cos(a)*88, H*0.25 + Math.sin(a)*88);
      ctx.stroke();
    }
    ctx.lineWidth = 2.5;
    // clouds
    ctx.beginPath(); ctx.arc(130, 120, 30, 0, Math.PI*2); ctx.arc(165, 105, 36, 0, Math.PI*2); ctx.arc(198, 120, 26, 0, Math.PI*2); ctx.stroke();
    ctx.beginPath(); ctx.arc(380, 150, 26, 0, Math.PI*2); ctx.arc(412, 136, 32, 0, Math.PI*2); ctx.arc(442, 150, 22, 0, Math.PI*2); ctx.stroke();
    // hills
    ctx.beginPath();
    ctx.moveTo(0, H*0.65); ctx.bezierCurveTo(W*0.15, H*0.35, W*0.4, H*0.3, W*0.6, H*0.5);
    ctx.bezierCurveTo(W*0.75, H*0.62, W*0.9, H*0.65, W, H*0.6);
    ctx.lineTo(W, H); ctx.lineTo(0, H); ctx.closePath(); ctx.stroke();
    ctx.beginPath();
    ctx.moveTo(0, H); ctx.lineTo(0, H*0.75);
    ctx.bezierCurveTo(W*0.1, H*0.55, W*0.3, H*0.52, W*0.45, H*0.68);
    ctx.bezierCurveTo(W*0.5, H*0.75, W*0.55, H*0.78, W*0.6, H);
    ctx.closePath(); ctx.stroke();
    ctx.beginPath();
    ctx.moveTo(W, H); ctx.lineTo(W, H*0.72);
    ctx.bezierCurveTo(W*0.9, H*0.52, W*0.72, H*0.5, W*0.6, H*0.65);
    ctx.bezierCurveTo(W*0.58, H*0.75, W*0.59, H*0.85, W*0.6, H);
    ctx.closePath(); ctx.stroke();
  }

  // init coloring book after page loads
  if (history.length > 0) cbInit();
</script>
