<!DOCTYPE html>
<html>
<head>
  <meta charset="UTF-8"/>
  <title>Chroma Diary · Connecting...</title>
  <style>
    body {
      background: #0e0e0f;
      color: #6b6868;
      font-family: monospace;
      display: flex;
      align-items: center;
      justify-content: center;
      height: 100vh;
      margin: 0;
      font-size: 0.8rem;
      letter-spacing: 0.1em;
    }
  </style>
</head>
<body>
  <div id="msg">connecting to spotify...</div>
  <script>
    const WORKER = 'https://chromadiary-proxy.sotempyhehe.workers.dev';

    async function exchangeCode() {
      const params = new URLSearchParams(window.location.search);
      const code = params.get('code');
      const error = params.get('error');

      if (error || !code) {
        document.getElementById('msg').textContent = 'spotify authorization failed. please try again.';
        return;
      }

      try {
        const res = await fetch(WORKER, {
          method: 'POST',
          headers: { 'Content-Type': 'application/json' },
          body: JSON.stringify({ action: 'spotify_token', code })
        });

        const data = await res.json();

        if (data.access_token) {
          if (window.opener) {
            window.opener.postMessage({
              type: 'spotify_token',
              access_token: data.access_token,
              refresh_token: data.refresh_token,
              expires_in: data.expires_in || 3600
            }, '*');
          }
          document.getElementById('msg').textContent = 'connected. closing...';
          setTimeout(() => window.close(), 1200);
        } else {
          document.getElementById('msg').textContent = 'something went wrong: ' + (data.error_description || JSON.stringify(data));
        }
      } catch(e) {
        document.getElementById('msg').textContent = 'connection error. please try again.';
      }
    }

    exchangeCode();
  </script>
</body>
</html>
